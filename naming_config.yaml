# ============================================================
# 命名规范配置
# ============================================================
# rules: 可复用命名表达式
#   ["_", ...] - 子项之间用 _ 连接
#   ["", ...]  - 子项之间不加分隔符
#   $TYPE?     - 可选段
# bindings: 将规则绑定到表、字段、指标等检查场景

types:
  source:
    label: 来源系统
    desc: 来源业务系统或 CDC 标识
    patterns:
      - "^[a-z0-9]+$"

  entity:
    label: 业务实体
    desc: 业务主体名称
    patterns:
      - "^[a-z][a-z0-9_]*$"

  business_view:
    label: 业务视图
    desc: ADS 层业务视图名称
    patterns:
      - "^[a-z][a-z0-9_]*$"

  load_type:
    label: 装载类型
    desc: 全量/增量标识
    allow:
      - full
      - inc

  time_granularity:
    label: 时间粒度
    desc: 汇总时间周期
    allow:
      - daily
      - monthly
      - weekly
      - yearly

  prefix_field:
    label: 字段限定前缀
    desc: 度量或布尔限定词
    allow:
      - min
      - max
      - avg
      - sum
      - first
      - last
      - is
      - has

  suffix_field:
    label: 字段后缀类型
    desc: 字段的业务类型后缀
    allow:
      - id
      - name
      - code
      - date
      - time
      - amount
      - price
      - cost
      - count
      - quantity
      - status
      - type
      - level
      - score
      - segment
      - method
      - num
      - rate
      - ratio
      - flag
      - desc
      - note

  metric_name:
    label: 指标名
    desc: 默认小写下划线指标名
    patterns:
      - "^[a-z][a-z0-9]*(?:_[a-z0-9]+)*$"

rules:
  TABLE_ODS: ["_", ods, "$source", "$entity", "$load_type"]
  TABLE_DIM: ["_", dim, "$entity"]
  TABLE_DWD: ["_", dwd, "$entity"]
  TABLE_DWS: ["_", dws, "$entity", "$time_granularity?"]
  TABLE_ADS: ["_", ads, "$business_view"]
  COLUMN_DEFAULT: ["_", "$prefix_field?", "$entity", "$suffix_field?"]

  ATOMIC_METRIC:
    desc: 原子指标命名 lower_snake_case
    expr: "$metric_name"

  DERIVED_METRIC:
    desc: 派生指标命名 lower_snake_case
    expr: "$metric_name"

bindings:
  table:
    ODS:
      - "@TABLE_ODS"
    DIM:
      - "@TABLE_DIM"
    DWD:
      - "@TABLE_DWD"
    DWS:
      - "@TABLE_DWS"
    ADS:
      - "@TABLE_ADS"

  column:
    allow:
      - etl_time
      - snapshot_date
      - create_time
      - update_time
    rules:
      - "@COLUMN_DEFAULT"

  metric:
    atomic: "@ATOMIC_METRIC"
    derived: "@DERIVED_METRIC"
