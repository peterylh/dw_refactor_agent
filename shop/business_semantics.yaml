version: 1
project: shop
source: llm_round2
data_domains:
- id: '01'
  code: CUST
  name: 客户域
  description: 客户资料、会员画像、客户分层、客户订单偏好等数据。
- id: '02'
  code: PROD
  name: 商品域
  description: 商品、品类、品牌、价格、成本、上下架和商品属性等数据。
- id: '03'
  code: STOR
  name: 门店域
  description: 门店基础信息、区域、等级、营业状态和门店经营属性等数据。
- id: '04'
  code: ORDR
  name: 订单交易域
  description: 订单、订单明细、销售交易、支付金额、折扣和毛利等数据。
- id: '05'
  code: INVT
  name: 库存域
  description: 库存数量、库存快照、补货时间、缺货和库存状态等数据。
- id: '06'
  code: PROM
  name: 促销域
  description: 促销活动、活动类型、优惠规则、促销商品和活动效果等数据。
- id: '99'
  code: OTHR
  name: 其它
  description: 无法明确归属到上述数据域，或模型核心内容跨域且无明显主归属时使用。
business_areas:
- id: '01'
  code: SHOP
  name: 门店零售
  description: 覆盖 shop 集市的门店零售经营、销售、库存、客户、商品和促销分析场景。
business_processes:
- code: INVENTORY_MANAGEMENT
  name: 库存管理
  data_domain: '05'
  business_area: SHOP
  tables:
  - dwd_inventory
  - dws_inventory_daily
  source: llm_round2
- code: ORDER_TRANSACTION
  name: 订单交易
  data_domain: '04'
  business_area: SHOP
  tables:
  - dwd_order_detail
  - dws_category_sales_monthly
  - dws_customer_order_summary
  - dws_product_sales_daily
  - dws_store_sales_daily
  source: llm_round2
- code: PROMOTION_EFFECT
  name: 促销效果
  data_domain: '06'
  business_area: SHOP
  tables:
  - dws_promotion_effect_daily
  source: llm_round2
semantic_subjects:
- code: CUST
  name: 客户
  data_domain: '01'
  business_area: SHOP
  tables:
  - dwd_customer
  source: llm_round2
- code: PROD
  name: 商品
  data_domain: '02'
  business_area: SHOP
  tables:
  - dwd_product
  source: llm_round2
- code: PROMOTION
  name: 促销活动
  data_domain: '06'
  business_area: SHOP
  tables:
  - dwd_promotion
  source: llm_round2
- code: STORE
  name: 门店
  data_domain: '03'
  business_area: SHOP
  tables:
  - dwd_store
  source: llm_round2
