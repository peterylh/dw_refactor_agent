version: 2
name: dws_account_daily_snapshot
layer: DWS
table_type: fact
config:
  materialized: full
atomic_metrics:
- active_account_count
- closed_account_count
- dormant_account_count
- past_due_count
- near_limit_count
- account_count
derived_metrics:
- daily_transaction_count
- daily_transaction_amount
- daily_debit_count
- daily_credit_count
calculated_metrics:
- credit_utilization_pct
business_area: DPST
grain:
  keys:
  - account_key
  - snapshot_date
  entities:
  - ACCT
  time_column: snapshot_date
  time_period: D
