version: 2
name: dwd_accounts
layer: DIM
table_type: dimension
config:
  materialized: full
entities:
- code: ACCOUNT
  type: primary
  name: 账户
  key_columns:
  - account_id
- code: CUSTOMER
  type: foreign
  name: 客户
  key_columns:
  - customer_id
  relationship:
    type: many_to_one
    from_entity: ACCOUNT
- code: PRODUCT
  type: foreign
  name: 产品
  key_columns:
  - product_id
  relationship:
    type: many_to_one
    from_entity: ACCOUNT
dimension_role: BASE
dimension_content_type: INFO
