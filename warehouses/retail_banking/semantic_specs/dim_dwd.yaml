  materialize: true
  target_layer: DIM
  target_table: dim_accounting_rule
  table_type: dimension
  primary_entity: {code: ACCOUNTING_RULE, key_columns: [id]}
  related_entities:
  - {role: office, entity: OFFICE, key_columns: [office_id], source_fk: [office_id]}
  - {role: debit_gl_account, entity: GL_ACCOUNT, key_columns: [debit_account_id], source_fk: [debit_account_id]}
  - {role: credit_gl_account, entity: GL_ACCOUNT, key_columns: [credit_account_id], source_fk: [credit_account_id]}
  grain: {columns: [id], description: one accounting rule definition}
  business_date: *none_date
  business_process: null
  semantic_subject: ACCOUNTING_RULE
  sensitivity: *internal
  allowed_alternatives: []
  rationale: Accounting rule is stable reference data with explicit office and GL roles.

