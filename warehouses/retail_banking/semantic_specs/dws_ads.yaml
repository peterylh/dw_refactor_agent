version: 1
project: retail_banking
status: human_reviewed_candidate
upstream_commit: 45d8e24f82c9c42c46a6762b24e102ad2c723824

# `current_name` anchors this review to the generated baseline. `name` is the
# adjudicated canonical name that future physical assets should implement.
dws:
  - current_name: dws_account_transfer_transaction_daily
    name: dws_account_transfer_daily
    decision: revise
    source: [dwd_account_transfer_transaction, dwd_account_transfer]
    canonical_process: account_transfer
    business_date: {column: transaction_date, output_column: stat_date, kind: event_date}
    grain: {columns: [stat_date, from_office_id, to_office_id, transfer_type, currency_code], description: "one day, office pair, transfer type and currency"}
    entities: [{code: FROM_OFFICE, key: from_office_id}, {code: TO_OFFICE, key: to_office_id}]
    degenerate_dimensions: [transfer_type, currency_code]
    metrics:
      - {name: record_count, class: derived, formula: "count(*)", unit: count, currency_source: not_applicable, aggregation_behavior: additive, additive_over: [stat_date, from_office_id, to_office_id, transfer_type, currency_code], sign: positive_count, reversal: exclude_is_reversed_true}
      - {name: total_amount, class: derived, formula: "sum(amount)", unit: currency, currency_source: currency_code, aggregation_behavior: additive, additive_over: [stat_date, from_office_id, to_office_id, transfer_type], sign: unsigned_transfer_amount, reversal: exclude_is_reversed_true}

  - current_name: dws_cashier_transaction_daily
    name: dws_cashier_transaction_daily
    decision: accept
    source: [dwd_cashier_transaction]
    canonical_process: cashier_operation
    business_date: {column: txn_date, output_column: stat_date, kind: event_date}
    grain: {columns: [stat_date, cashier_id, currency_code, txn_type], description: "one day, cashier, currency and transaction type"}
    entities: [{code: CASHIER, key: cashier_id}]
    degenerate_dimensions: [currency_code, txn_type]
    metrics:
      - {name: record_count, class: derived, formula: "count(*)", unit: count, currency_source: not_applicable, aggregation_behavior: additive, additive_over: [stat_date, cashier_id, currency_code, txn_type], sign: positive_count, reversal: source_has_no_reversal_flag}
      - {name: total_txn_amount, class: derived, formula: "sum(txn_amount)", unit: currency, currency_source: currency_code, aggregation_behavior: additive, additive_over: [stat_date, cashier_id, txn_type], sign: gross_by_txn_type, reversal: source_has_no_reversal_flag}

