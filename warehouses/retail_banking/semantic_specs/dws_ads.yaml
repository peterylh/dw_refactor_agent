ads:
  - current_name: ads_branch_cash_transfer_daily
    name: ads_branch_cash_transfer_daily
    decision: accept
    source: [dws_office_cash_transfer_daily]
    canonical_process: cashier_operation
    business_date: {column: stat_date, kind: inherited_event_date}
    grain: {columns: [stat_date, from_office_id, to_office_id, currency_code], description: "one day, office pair and currency"}
    entities: [{code: FROM_OFFICE, key: from_office_id}, {code: TO_OFFICE, key: to_office_id}]
    degenerate_dimensions: [currency_code]
    metrics:
      - {name: record_count, class: derived, formula: "source.record_count", unit: count, currency_source: not_applicable, aggregation_behavior: additive, additive_over: [stat_date, from_office_id, to_office_id, currency_code], sign: positive_count, reversal: inherited_source_policy}
      - {name: total_transaction_amount, class: derived, formula: "source.total_transaction_amount", unit: currency, currency_source: currency_code, aggregation_behavior: additive, additive_over: [stat_date, from_office_id, to_office_id], sign: unsigned_transfer_amount, reversal: inherited_source_policy}
      - {name: average_transaction_amount, class: calculated, formula: "total_transaction_amount / nullif(record_count, 0)", unit: currency, currency_source: currency_code, aggregation_behavior: non_additive, additive_over: [], sign: unsigned_transfer_amount, reversal: inherited_source_policy}
    application_rules:
      - {name: average_transfer_value, kind: ratio, formula: "total_transaction_amount / nullif(record_count, 0)", purpose: "branch cash-transfer operations KPI"}

  - current_name: ads_cashier_operation_daily
    name: ads_cashier_operation_daily
    decision: accept
    source: [dws_cashier_transaction_daily]
    canonical_process: cashier_operation
    business_date: {column: stat_date, kind: inherited_event_date}
