      - {name: total_amount, class: derived, formula: "sum(amount)", unit: currency, currency_source: currency_code, aggregation_behavior: additive, additive_over: [stat_date, office_id, client_id, transaction_type_enum], sign: gross_by_transaction_type, reversal: exclude_is_reversed_true}

