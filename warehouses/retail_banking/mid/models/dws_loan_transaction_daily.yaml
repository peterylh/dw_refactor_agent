version: 2
name: dws_loan_transaction_daily
layer: DWS
description: 贷款与信贷 reviewed aggregate
table_type: aggregate_fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: stat_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
data_domain: '04'
business_area: LOAN
business_process: loan_transaction
sensitivity: restricted
business_date:
  column: transaction_date
  output_column: stat_date
  kind: event_date
grain:
  columns:
  - stat_date
  - office_id
  - loan_id
  - transaction_type_enum
  description: one day, office, loan and transaction type
  entities:
  - OFFICE
  - LOAN_ACCOUNT
  degenerate_dimensions: &id001
  - transaction_type_enum
  time_column: stat_date
  time_period: D
entities:
- code: OFFICE
  key: office_id
- code: LOAN_ACCOUNT
  key: loan_id
degenerate_dimensions: *id001
derived_metrics: &id002
- name: record_count
  class: derived
  formula: count(*)
  unit: count
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - loan_id
  - transaction_type_enum
  sign: positive_count
  reversal: exclude_is_reversed_true
- name: total_amount
  class: derived
  formula: sum(amount)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - loan_id
  - transaction_type_enum
  sign: gross_by_transaction_type
  reversal: exclude_is_reversed_true
- name: total_principal_component
  class: derived
  formula: sum(principal_portion_derived)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - loan_id
  - transaction_type_enum
  sign: gross_by_transaction_type
  reversal: exclude_is_reversed_true
- name: total_interest_component
  class: derived
  formula: sum(interest_portion_derived)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - loan_id
  - transaction_type_enum
  sign: gross_by_transaction_type
  reversal: exclude_is_reversed_true
- name: total_fee_component
  class: derived
  formula: sum(fee_charges_portion_derived)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - loan_id
  - transaction_type_enum
  sign: gross_by_transaction_type
  reversal: exclude_is_reversed_true
- name: total_penalty_component
  class: derived
  formula: sum(penalty_charges_portion_derived)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - loan_id
  - transaction_type_enum
  sign: gross_by_transaction_type
  reversal: exclude_is_reversed_true
metric_semantics: *id002
human_review:
  decision: accept
  current_name: dws_loan_transaction_daily
  status: human_reviewed_candidate
