version: 2
name: dwd_account_transfer_transaction
layer: DWD
description: Source has a dated monetary transfer event and links both ledger-side transactions.
table_type: fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: business_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
  undated_row_policy: refresh_on_every_daily_run
data_domain: '06'
business_area: PAYM
entities:
- code: ACCOUNT_TRANSFER_TRANSACTION
  type: primary
  name: Account Transfer Transaction
  key_columns:
  - id
- code: ACCOUNT_TRANSFER
  type: foreign
  role: transfer_instruction
  name: Account Transfer
  key_columns:
  - account_transfer_details_id
  source_fk:
  - account_transfer_details_id
- code: LOAN_TRANSACTION
  type: foreign
  role: from_loan_transaction
  name: Loan Transaction
  key_columns:
  - from_loan_transaction_id
  source_fk:
  - from_loan_transaction_id
- code: LOAN_TRANSACTION
  type: foreign
  role: to_loan_transaction
  name: Loan Transaction
  key_columns:
  - to_loan_transaction_id
  source_fk:
  - to_loan_transaction_id
grain:
  description: one executed account transfer transaction
  columns:
  - id
business_date:
  kind: event
  column: business_date
  inherit_from: null
  source_column: transaction_date
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_account_transfer_transaction
  ods_table: ods_fineract_m_account_transfer_transaction
  disposition: standalone_fact
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity:
- name: description
  classification: pii
  action: mask
human_review:
  verdict: accept
  allowed_alternatives: []
business_process: account_transfer
atomic_metrics:
- amount
metric_semantics:
- name: amount
  class: atomic
  aggregation_behavior: additive
  formula: amount
  unit: currency
  currency_source: currency_code
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
