version: 2
name: dwd_office_cash_transfer
layer: DWD
description: Monetary event is valid after replacing the invalid generated payment-management code.
table_type: fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: business_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
  undated_row_policy: refresh_on_every_daily_run
data_domain: '06'
business_area: PAYM
entities:
- code: OFFICE_CASH_TRANSFER
  type: primary
  name: Office Cash Transfer
  key_columns:
  - id
- code: OFFICE
  type: foreign
  role: from_office
  name: Office
  key_columns:
  - from_office_id
  source_fk:
  - from_office_id
- code: OFFICE
  type: foreign
  role: to_office
  name: Office
  key_columns:
  - to_office_id
  source_fk:
  - to_office_id
grain:
  description: one dated inter-office cash movement
  columns:
  - id
business_date:
  kind: event
  column: business_date
  inherit_from: null
  source_column: transaction_date
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_office_transaction
  ods_table: ods_fineract_m_office_transaction
  disposition: standalone_fact
  confidence: human_reviewed
sensitivity: internal
sensitivity_policy:
  level: internal
  action: retain
column_sensitivity: []
human_review:
  verdict: revise
  allowed_alternatives:
  - office_cash_transfer_process
business_process: cashier_operation
atomic_metrics:
- transaction_amount
metric_semantics:
- name: transaction_amount
  class: atomic
  aggregation_behavior: additive
  formula: transaction_amount
  unit: currency
  currency_source: currency_code
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
