version: 2
name: dwd_loan_restructure_event
layer: DWD
description: Submitted, approved and rejected dates define a clear restructuring lifecycle.
table_type: accumulating_snapshot
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: business_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
  undated_row_policy: refresh_on_every_daily_run
data_domain: '04'
business_area: LOAN
entities:
- code: LOAN_RESTRUCTURE_EVENT
  type: primary
  name: Loan Restructure Event
  key_columns:
  - id
- code: LOAN_ACCOUNT
  type: foreign
  role: loan_account
  name: Loan Account
  key_columns:
  - loan_id
  source_fk:
  - loan_id
- code: CODE_VALUE
  type: foreign
  role: restructure_reason
  name: Code Value
  key_columns:
  - reschedule_reason_cv_id
  source_fk:
  - reschedule_reason_cv_id
grain:
  description: one loan reschedule request lifecycle
  columns:
  - id
business_date:
  kind: event
  column: business_date
  inherit_from: null
  source_column: submitted_on_date
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_loan_reschedule_request
  ods_table: ods_fineract_m_loan_reschedule_request
  disposition: snapshot_source
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity:
- name: reschedule_reason_comment
  classification: pii
  action: mask
human_review:
  verdict: accept
  allowed_alternatives: []
business_process: loan_restructure
