version: 2
name: dwd_loan_account_daily_snapshot
layer: DWD
description: Time-varying account balances split from durable DIM attributes.
table_type: snapshot_fact
execution:
  materialized: incremental
  full_refresh_strategy: legacy_full_refresh
  slice:
    param: etl_date
    column: snapshot_date
    period: D
  snapshot_mode: current_state_capture
  historical_replay_supported: false
  source_contract: ODS current state at execution time
data_domain: '04'
business_area: LOAN
entities:
- code: LOAN_ACCOUNT
  type: primary
  name: Loan Account
  key_columns:
  - id
- code: CUSTOMER
  type: foreign
  role: borrower_customer
  name: Customer
  key_columns:
  - client_id
  source_fk:
  - client_id
- code: CUSTOMER_GROUP
  type: foreign
  role: borrower_group
  name: Customer Group
  key_columns:
  - group_id
  source_fk:
  - group_id
- code: LOAN_PRODUCT
  type: foreign
  role: loan_product
  name: Loan Product
  key_columns:
  - product_id
  source_fk:
  - product_id
- code: STAFF
  type: foreign
  role: loan_officer
  name: Staff
  key_columns:
  - loan_officer_id
  source_fk:
  - loan_officer_id
grain:
  description: one account state per extraction date
  columns:
  - id
  - snapshot_date
business_date:
  kind: snapshot
  column: snapshot_date
  inherit_from: etl_context.etl_date
  source_column: snapshot_date
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_loan
  ods_table: ods_fineract_m_loan
  disposition: standalone_dimension
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity:
- name: account_no
  classification: identifier
  action: hash
- name: external_id
  classification: identifier
  action: hash
human_review:
  verdict: revise
  allowed_alternatives: []
business_process: loan_account_management
atomic_metrics:
- principal_amount_proposed
- principal_amount
- approved_principal
- net_disbursal_amount
- arrearstolerance_amount
- interest_rate_differential
- nominal_interest_rate_per_period
- annual_nominal_interest_rate
- total_charges_due_at_disbursement_derived
- principal_disbursed_derived
- principal_repaid_derived
- principal_writtenoff_derived
- principal_outstanding_derived
- interest_charged_derived
- interest_repaid_derived
- interest_waived_derived
- interest_writtenoff_derived
- interest_outstanding_derived
- fee_charges_charged_derived
- fee_charges_repaid_derived
- fee_charges_waived_derived
- fee_charges_writtenoff_derived
- fee_charges_outstanding_derived
- penalty_charges_charged_derived
- penalty_charges_repaid_derived
- penalty_charges_waived_derived
- penalty_charges_writtenoff_derived
- penalty_charges_outstanding_derived
- total_expected_repayment_derived
- total_repayment_derived
- total_expected_costofloan_derived
- total_costofloan_derived
- total_waived_derived
- total_writtenoff_derived
- total_outstanding_derived
- total_overpaid_derived
- loan_counter
- loan_product_counter
- fixed_emi_amount
- max_outstanding_loan_balance
- total_recovered_derived
- guarantee_amount_derived
- fixed_principal_percentage_per_installment
- principal_adjustments_derived
- disbursed_amount_percentage_for_down_payment
- capitalized_income_derived
