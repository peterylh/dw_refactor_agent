version: 2
name: dws_loan_installment_charge_due_current
layer: DWS
description: 贷款与信贷 reviewed aggregate
table_type: aggregate_fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: due_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
data_domain: '04'
business_area: LOAN
business_process: loan_repayment
sensitivity: restricted
business_date:
  column: due_date
  output_column: due_date
  kind: contractual_due_date_not_snapshot_date
grain:
  columns:
  - due_date
  - loan_id
  - loan_charge_id
  description: current charge state by contractual due date, loan and charge
  entities:
  - LOAN_ACCOUNT
  degenerate_dimensions: &id001
  - loan_charge_id
  time_column: due_date
  time_period: D
entities:
- code: LOAN_ACCOUNT
  key: loan_id
degenerate_dimensions: *id001
derived_metrics: &id002
- name: installment_charge_count
  class: derived
  formula: count(*)
  unit: count
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - due_date
  - loan_id
  - loan_charge_id
  sign: positive_count
  reversal: not_applicable
- name: total_due_amount
  class: derived
  formula: sum(amount)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - due_date
  - loan_id
  - loan_charge_id
  sign: positive_due
  reversal: not_applicable
- name: current_paid_amount
  class: derived
  formula: sum(amount_paid_derived)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: semi_additive
  additive_over:
  - loan_id
  - loan_charge_id
  sign: positive_state_balance
  reversal: source_current_state
- name: current_waived_amount
  class: derived
  formula: sum(amount_waived_derived)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: semi_additive
  additive_over:
  - loan_id
  - loan_charge_id
  sign: positive_state_balance
  reversal: source_current_state
- name: current_written_off_amount
  class: derived
  formula: sum(amount_writtenoff_derived)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: semi_additive
  additive_over:
  - loan_id
  - loan_charge_id
  sign: positive_state_balance
  reversal: source_current_state
- name: current_outstanding_amount
  class: derived
  formula: sum(amount_outstanding_derived)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: semi_additive
  additive_over:
  - loan_id
  - loan_charge_id
  sign: positive_state_balance
  reversal: source_current_state
metric_semantics: *id002
human_review:
  decision: revise
  current_name: dws_loan_installment_charge_due_daily
  status: human_reviewed_candidate
