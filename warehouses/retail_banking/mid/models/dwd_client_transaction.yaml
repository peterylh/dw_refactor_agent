version: 2
name: dwd_client_transaction
layer: DWD
description: Source has a dated customer transaction, amount and reversal semantics.
table_type: fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: business_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
  undated_row_policy: refresh_on_every_daily_run
data_domain: '01'
business_area: CLNT
entities:
- code: CLIENT_TRANSACTION
  type: primary
  name: Client Transaction
  key_columns:
  - id
- code: CUSTOMER
  type: foreign
  role: customer
  name: Customer
  key_columns:
  - client_id
  source_fk:
  - client_id
grain:
  description: one customer-level monetary transaction
  columns:
  - id
business_date:
  kind: event
  column: business_date
  inherit_from: null
  source_column: transaction_date
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_client_transaction
  ods_table: ods_fineract_m_client_transaction
  disposition: standalone_fact
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity:
- name: external_id
  classification: identifier
  action: hash
human_review:
  verdict: accept
  allowed_alternatives: []
business_process: customer_management
atomic_metrics:
- amount
metric_semantics:
- name: amount
  class: atomic
  aggregation_behavior: additive
  formula: amount
  unit: currency
  currency_source: currency_code
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
