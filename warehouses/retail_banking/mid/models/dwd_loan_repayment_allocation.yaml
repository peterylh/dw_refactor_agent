version: 2
name: dwd_loan_repayment_allocation
layer: DWD
description: Parent loan transaction provides event time while allocation fields provide component amounts.
table_type: fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: business_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
  undated_row_policy: refresh_on_every_daily_run
data_domain: '04'
business_area: LOAN
entities:
- code: LOAN_REPAYMENT_ALLOCATION
  type: primary
  name: Loan Repayment Allocation
  key_columns:
  - id
- code: LOAN_TRANSACTION
  type: foreign
  role: loan_transaction
  name: Loan Transaction
  key_columns:
  - loan_transaction_id
  source_fk:
  - loan_transaction_id
- code: LOAN_INSTALLMENT
  type: foreign
  role: loan_installment
  name: Loan Installment
  key_columns:
  - loan_repayment_schedule_id
  source_fk:
  - loan_repayment_schedule_id
grain:
  description: one repayment transaction-to-installment allocation
  columns:
  - loan_transaction_id
  - loan_repayment_schedule_id
  - id
business_date:
  kind: inherited
  column: business_date
  inherit_from: m_loan_transaction.transaction_date
  source_column: null
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_loan_transaction_repayment_schedule_mapping
  ods_table: ods_fineract_m_loan_transaction_repayment_schedule_mapping
  disposition: standalone_fact
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity: []
human_review:
  verdict: revise
  allowed_alternatives: []
business_process: loan_repayment
atomic_metrics:
- amount
- principal_portion_derived
- interest_portion_derived
- fee_charges_portion_derived
- penalty_charges_portion_derived
metric_semantics:
- name: amount
  class: atomic
  aggregation_behavior: additive
  formula: amount
  unit: currency
  currency_source: account_currency
  additive_over:
  - loan_transaction_id
  - loan_repayment_schedule_id
  - id
  sign: source_defined
  reversal: source_policy
- name: principal_portion_derived
  class: atomic
  aggregation_behavior: additive
  formula: principal_portion_derived
  unit: currency
  currency_source: account_currency
  additive_over:
  - loan_transaction_id
  - loan_repayment_schedule_id
  - id
  sign: source_defined
  reversal: source_policy
- name: interest_portion_derived
  class: atomic
  aggregation_behavior: additive
  formula: interest_portion_derived
  unit: currency
  currency_source: account_currency
  additive_over:
  - loan_transaction_id
  - loan_repayment_schedule_id
  - id
  sign: source_defined
  reversal: source_policy
- name: fee_charges_portion_derived
  class: atomic
  aggregation_behavior: additive
  formula: fee_charges_portion_derived
  unit: currency
  currency_source: account_currency
  additive_over:
  - loan_transaction_id
  - loan_repayment_schedule_id
  - id
  sign: source_defined
  reversal: source_policy
- name: penalty_charges_portion_derived
  class: atomic
  aggregation_behavior: additive
  formula: penalty_charges_portion_derived
  unit: currency
  currency_source: account_currency
  additive_over:
  - loan_transaction_id
  - loan_repayment_schedule_id
  - id
  sign: source_defined
  reversal: source_policy
