version: 2
name: dwd_loan_officer_assignment
layer: DWD
description: Assignment is an effective relationship and uses a canonical operations process.
table_type: factless_fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: business_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
  undated_row_policy: refresh_on_every_daily_run
data_domain: '04'
business_area: LOAN
entities:
- code: LOAN_OFFICER_ASSIGNMENT
  type: primary
  name: Loan Officer Assignment
  key_columns:
  - id
- code: LOAN_ACCOUNT
  type: foreign
  role: loan_account
  name: Loan Account
  key_columns:
  - loan_id
  source_fk:
  - loan_id
- code: STAFF
  type: foreign
  role: loan_officer
  name: Staff
  key_columns:
  - loan_officer_id
  source_fk:
  - loan_officer_id
grain:
  description: one loan-officer effective interval
  columns:
  - id
business_date:
  kind: period_start
  column: business_date
  inherit_from: null
  source_column: start_date
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_loan_officer_assignment_history
  ods_table: ods_fineract_m_loan_officer_assignment_history
  disposition: standalone_fact
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity: []
human_review:
  verdict: revise
  allowed_alternatives:
  - bridge_loan_officer_history
business_process: operations_management
