version: 2
name: dwd_share_account_daily_snapshot
layer: DWD
description: Time-varying account balances split from durable DIM attributes.
table_type: snapshot_fact
execution:
  materialized: incremental
  full_refresh_strategy: legacy_full_refresh
  snapshot_mode: current_state_capture
  historical_replay_supported: false
  source_contract: ODS current state at execution time
data_domain: 09
business_area: ASTM
entities:
- code: SHARE_ACCOUNT
  type: primary
  name: Share Account
  key_columns:
  - id
- code: CUSTOMER
  type: foreign
  role: owner_customer
  name: Customer
  key_columns:
  - client_id
  source_fk:
  - client_id
- code: SHARE_PRODUCT
  type: foreign
  role: share_product
  name: Share Product
  key_columns:
  - product_id
  source_fk:
  - product_id
- code: DEPOSIT_ACCOUNT
  type: foreign
  role: settlement_account
  name: Deposit Account
  key_columns:
  - savings_account_id
  source_fk:
  - savings_account_id
grain:
  description: one account state per extraction date
  columns:
  - id
  - snapshot_date
business_date:
  kind: snapshot
  column: snapshot_date
  inherit_from: etl_context.etl_date
  source_column: snapshot_date
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_share_account
  ods_table: ods_fineract_m_share_account
  disposition: standalone_dimension
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity:
- name: account_no
  classification: identifier
  action: hash
- name: external_id
  classification: identifier
  action: hash
human_review:
  verdict: revise
  allowed_alternatives: []
business_process: share_account_management
atomic_metrics:
- total_approved_shares
- total_pending_shares
- minimum_active_period_frequency
- lockin_period_frequency
metric_semantics:
- name: total_approved_shares
  class: atomic
  aggregation_behavior: semi_additive
  formula: total_approved_shares
  unit: shares
  currency_source: not_applicable
  additive_over: []
  sign: source_defined
  reversal: source_policy
- name: total_pending_shares
  class: atomic
  aggregation_behavior: semi_additive
  formula: total_pending_shares
  unit: shares
  currency_source: not_applicable
  additive_over: []
  sign: source_defined
  reversal: source_policy
- name: minimum_active_period_frequency
  class: atomic
  aggregation_behavior: semi_additive
  formula: minimum_active_period_frequency
  unit: currency
  currency_source: currency_code
  additive_over: []
  sign: source_defined
  reversal: source_policy
- name: lockin_period_frequency
  class: atomic
  aggregation_behavior: semi_additive
  formula: lockin_period_frequency
  unit: currency
  currency_source: currency_code
  additive_over: []
  sign: source_defined
  reversal: source_policy
