version: 2
name: dwd_loan_transaction
layer: DWD
description: Source is the core dated loan transaction with component amounts and reversal semantics.
table_type: fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: business_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
  undated_row_policy: refresh_on_every_daily_run
data_domain: '04'
business_area: LOAN
entities:
- code: LOAN_TRANSACTION
  type: primary
  name: Loan Transaction
  key_columns:
  - id
- code: LOAN_ACCOUNT
  type: foreign
  role: loan_account
  name: Loan Account
  key_columns:
  - loan_id
  source_fk:
  - loan_id
- code: OFFICE
  type: foreign
  role: office
  name: Office
  key_columns:
  - office_id
  source_fk:
  - office_id
grain:
  description: one posted loan transaction
  columns:
  - id
business_date:
  kind: event
  column: business_date
  inherit_from: null
  source_column: transaction_date
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_loan_transaction
  ods_table: ods_fineract_m_loan_transaction
  disposition: standalone_fact
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity:
- name: external_id
  classification: identifier
  action: hash
- name: reversal_external_id
  classification: identifier
  action: hash
human_review:
  verdict: accept
  allowed_alternatives: []
business_process: loan_transaction
atomic_metrics:
- amount
- principal_portion_derived
- interest_portion_derived
- fee_charges_portion_derived
- penalty_charges_portion_derived
- overpayment_portion_derived
- unrecognized_income_portion
- outstanding_loan_balance_derived
metric_semantics:
- name: amount
  class: atomic
  aggregation_behavior: additive
  formula: amount
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: principal_portion_derived
  class: atomic
  aggregation_behavior: additive
  formula: principal_portion_derived
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: interest_portion_derived
  class: atomic
  aggregation_behavior: additive
  formula: interest_portion_derived
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: fee_charges_portion_derived
  class: atomic
  aggregation_behavior: additive
  formula: fee_charges_portion_derived
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: penalty_charges_portion_derived
  class: atomic
  aggregation_behavior: additive
  formula: penalty_charges_portion_derived
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: overpayment_portion_derived
  class: atomic
  aggregation_behavior: additive
  formula: overpayment_portion_derived
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: unrecognized_income_portion
  class: atomic
  aggregation_behavior: additive
  formula: unrecognized_income_portion
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: outstanding_loan_balance_derived
  class: atomic
  aggregation_behavior: semi_additive
  formula: outstanding_loan_balance_derived
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
