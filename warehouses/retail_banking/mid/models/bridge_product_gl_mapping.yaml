- code: CHARGE_TYPE
  type: foreign
  role: charge_definition
  name: Charge Type
  key_columns:
  - charge_id
  source_fk:
  - charge_id
- code: PAYMENT_TYPE
  type: foreign
  role: payment_type
  name: Payment Type
  key_columns:
  - payment_type
  source_fk:
  - payment_type
grain:
  description: one product or charge accounting-to-GL mapping rule
  columns:
  - id
business_date:
  kind: none
  column: null
  inherit_from: null
  source_column: null
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: acc_product_mapping
