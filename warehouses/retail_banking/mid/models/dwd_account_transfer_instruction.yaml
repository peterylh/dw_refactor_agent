version: 2
name: dwd_account_transfer_instruction
layer: DWD
description: Source is the transfer header and endpoint relationship, not the dated transfer transaction.
table_type: bridge
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: '06'
business_area: PAYM
entities:
- code: ACCOUNT_TRANSFER
  type: primary
  name: Account Transfer
  key_columns:
  - id
- code: CUSTOMER
  type: foreign
  role: from_customer
  name: Customer
  key_columns:
  - from_client_id
  source_fk:
  - from_client_id
- code: CUSTOMER
  type: foreign
  role: to_customer
  name: Customer
  key_columns:
  - to_client_id
  source_fk:
  - to_client_id
- code: DEPOSIT_ACCOUNT
  type: foreign
  role: from_deposit_account
  name: Deposit Account
  key_columns:
  - from_savings_account_id
  source_fk:
  - from_savings_account_id
- code: DEPOSIT_ACCOUNT
  type: foreign
  role: to_deposit_account
  name: Deposit Account
  key_columns:
  - to_savings_account_id
  source_fk:
  - to_savings_account_id
grain:
  description: one transfer instruction and its endpoint roles
  columns:
  - id
business_date:
  kind: inherited
  column: business_date
  inherit_from: m_account_transfer_transaction.transaction_date
  source_column: null
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_account_transfer_details
  ods_table: ods_fineract_m_account_transfer_details
  disposition: bridge_source
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity: []
human_review:
  verdict: revise
  allowed_alternatives:
  - bridge_account_transfer_endpoints
business_process: account_transfer
