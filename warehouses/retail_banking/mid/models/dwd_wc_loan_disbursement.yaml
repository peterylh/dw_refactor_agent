version: 2
name: dwd_wc_loan_disbursement
layer: DWD
description: Source has expected and actual disbursement dates and amounts at tranche grain.
table_type: fact
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: '10'
business_area: LOAN
entities:
- code: WC_LOAN_DISBURSEMENT
  type: primary
  name: Wc Loan Disbursement
  key_columns:
  - id
- code: WC_LOAN_ACCOUNT
  type: foreign
  role: wc_loan_account
  name: Wc Loan Account
  key_columns:
  - wc_loan_id
  source_fk:
  - wc_loan_id
grain:
  description: one expected or actual working-capital disbursement tranche
  columns:
  - id
business_date:
  kind: event
  column: business_date
  inherit_from: null
  source_column: actual_disburse_date
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_wc_loan_disbursement_detail
  ods_table: ods_fineract_m_wc_loan_disbursement_detail
  disposition: standalone_fact
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity: []
human_review:
  verdict: accept
  allowed_alternatives: []
business_process: loan_disbursement
atomic_metrics:
- expected_amount
- actual_amount
metric_semantics:
- name: expected_amount
  class: atomic
  aggregation_behavior: additive
  formula: expected_amount
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: actual_amount
  class: atomic
  aggregation_behavior: additive
  formula: actual_amount
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
