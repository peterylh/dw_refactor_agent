version: 2
name: dwd_share_charge_snapshot
layer: DWD
description: Source lacks a reliable event date and represents current charge settlement state.
table_type: accumulating_snapshot
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: 09
business_area: ASTM
entities:
- code: SHARE_CHARGE
  type: primary
  name: Share Charge
  key_columns:
  - id
- code: SHARE_ACCOUNT
  type: foreign
  role: share_account
  name: Share Account
  key_columns:
  - account_id
  source_fk:
  - account_id
- code: CHARGE_TYPE
  type: foreign
  role: charge_definition
  name: Charge Type
  key_columns:
  - charge_id
  source_fk:
  - charge_id
grain:
  description: one assessed share-account charge through settlement lifecycle
  columns:
  - id
business_date:
  kind: none
  column: null
  inherit_from: null
  source_column: null
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_share_account_charge
  ods_table: ods_fineract_m_share_account_charge
  disposition: snapshot_source
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity: []
human_review:
  verdict: revise
  allowed_alternatives:
  - dwd_share_charge_daily_snapshot
business_process: share_account_management
atomic_metrics:
- calculation_percentage
- calculation_on_amount
- charge_amount_or_percentage
- amount
- amount_paid_derived
- amount_waived_derived
- amount_writtenoff_derived
- amount_outstanding_derived
- min_cap
- max_cap
metric_semantics:
- name: calculation_percentage
  class: atomic
  aggregation_behavior: non_additive
  formula: calculation_percentage
  unit: rate
  currency_source: not_applicable
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: calculation_on_amount
  class: atomic
  aggregation_behavior: additive
  formula: calculation_on_amount
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: charge_amount_or_percentage
  class: atomic
  aggregation_behavior: non_additive
  formula: charge_amount_or_percentage
  unit: rate
  currency_source: not_applicable
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: amount
  class: atomic
  aggregation_behavior: additive
  formula: amount
  unit: currency
  currency_source: account_currency
  additive_over:
  - id
  sign: source_defined
  reversal: source_policy
- name: amount_paid_derived
