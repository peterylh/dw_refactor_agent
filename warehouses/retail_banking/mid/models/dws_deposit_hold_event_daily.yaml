version: 2
name: dws_deposit_hold_event_daily
layer: DWS
description: 存款与储蓄 reviewed aggregate
table_type: aggregate_fact
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: '05'
business_area: DPST
business_process: deposit_transaction
sensitivity: restricted
business_date:
  column: transaction_date
  output_column: stat_date
  kind: event_date
grain:
  columns:
  - stat_date
  - savings_account_id
  - transaction_type_enum
  description: one day, deposit account and hold transaction type
  entities:
  - DEPOSIT_ACCOUNT
  degenerate_dimensions: &id001
  - transaction_type_enum
  time_column: stat_date
  time_period: D
entities:
- code: DEPOSIT_ACCOUNT
  key: savings_account_id
degenerate_dimensions: *id001
derived_metrics: &id002
- name: record_count
  class: derived
  formula: count(*)
  unit: count
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - savings_account_id
  - transaction_type_enum
  sign: positive_count
  reversal: exclude_is_reversed_true
- name: total_amount
  class: derived
  formula: sum(amount)
  unit: currency
  currency_source: dim_deposit_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - savings_account_id
  - transaction_type_enum
  sign: gross_by_transaction_type
  reversal: exclude_is_reversed_true
metric_semantics: *id002
human_review:
  decision: revise
  current_name: dws_deposit_hold_event_daily
  status: human_reviewed_candidate
