version: 2
name: dws_deposit_transaction_daily
layer: DWS
description: 存款与储蓄 reviewed aggregate
table_type: aggregate_fact
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: '05'
business_area: DPST
business_process: deposit_transaction
sensitivity: restricted
business_date:
  column: transaction_date
  output_column: stat_date
  kind: event_date
grain:
  columns:
  - stat_date
  - office_id
  - savings_account_id
  - transaction_type_enum
  description: one day, office, deposit account and transaction type
  entities:
  - OFFICE
  - DEPOSIT_ACCOUNT
  degenerate_dimensions: &id001
  - transaction_type_enum
  time_column: stat_date
  time_period: D
entities:
- code: OFFICE
  key: office_id
- code: DEPOSIT_ACCOUNT
  key: savings_account_id
degenerate_dimensions: *id001
derived_metrics: &id002
- name: record_count
  class: derived
  formula: count(*)
  unit: count
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - savings_account_id
  - transaction_type_enum
  sign: positive_count
  reversal: exclude_is_reversed_true
- name: total_amount
  class: derived
  formula: sum(amount)
  unit: currency
  currency_source: dim_deposit_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - savings_account_id
  - transaction_type_enum
  sign: gross_by_transaction_type
  reversal: exclude_is_reversed_true
- name: total_overdraft_amount
  class: derived
  formula: sum(overdraft_amount_derived)
  unit: currency
  currency_source: dim_deposit_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - savings_account_id
  - transaction_type_enum
  sign: positive_component
  reversal: exclude_is_reversed_true
metric_semantics: *id002
human_review:
  decision: accept
  current_name: dws_deposit_transaction_daily
  status: human_reviewed_candidate
