version: 2
name: dim_loan_account
layer: DIM
description: Durable account descriptors belong in DIM; balances and cumulative servicing amounts are
  snapshot facts.
table_type: dimension
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: '04'
business_area: LOAN
entities:
- code: LOAN_ACCOUNT
  type: primary
  name: Loan Account
  key_columns:
  - id
- code: CUSTOMER
  type: foreign
  role: borrower_customer
  name: Customer
  key_columns:
  - client_id
  source_fk:
  - client_id
- code: CUSTOMER_GROUP
  type: foreign
  role: borrower_group
  name: Customer Group
  key_columns:
  - group_id
  source_fk:
  - group_id
- code: LOAN_PRODUCT
  type: foreign
  role: loan_product
  name: Loan Product
  key_columns:
  - product_id
  source_fk:
  - product_id
grain:
  description: one effective loan account version excluding balances
  columns:
  - id
business_date:
  kind: none
  column: null
  inherit_from: null
  source_column: null
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_loan
  ods_table: ods_fineract_m_loan
  disposition: standalone_dimension
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity:
- name: account_no
  classification: identifier
  action: hash
- name: external_id
  classification: identifier
  action: hash
human_review:
  verdict: revise
  allowed_alternatives:
  - dim_loan_account_scd2
semantic_subject: LOAN_ACCOUNT
dimension_role: BASE
dimension_content_type: INFO
dimension_policy:
  stable_fields:
  - id
  - account_no
  - external_id
  - client_id
  - group_id
  - product_id
  - fund_id
  - loan_type_enum
  - currency_code
  - loan_transaction_strategy_code
  snapshot_target:
    layer: DWD
    table: dwd_loan_account_daily_snapshot
    date_column: snapshot_date
