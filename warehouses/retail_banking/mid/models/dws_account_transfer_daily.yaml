version: 2
name: dws_account_transfer_daily
layer: DWS
description: 支付结算 reviewed aggregate
table_type: aggregate_fact
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: '06'
business_area: PAYM
business_process: account_transfer
sensitivity: restricted
business_date:
  column: transaction_date
  output_column: stat_date
  kind: event_date
grain:
  columns:
  - stat_date
  - from_office_id
  - to_office_id
  - transfer_type
  - currency_code
  description: one day, office pair, transfer type and currency
  entities:
  - FROM_OFFICE
  - TO_OFFICE
  degenerate_dimensions: &id001
  - transfer_type
  - currency_code
  time_column: stat_date
  time_period: D
entities:
- code: FROM_OFFICE
  key: from_office_id
- code: TO_OFFICE
  key: to_office_id
degenerate_dimensions: *id001
derived_metrics: &id002
- name: record_count
  class: derived
  formula: count(*)
  unit: count
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - from_office_id
  - to_office_id
  - transfer_type
  - currency_code
  sign: positive_count
  reversal: exclude_is_reversed_true
- name: total_amount
  class: derived
  formula: sum(amount)
  unit: currency
  currency_source: currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - from_office_id
  - to_office_id
  - transfer_type
  sign: unsigned_transfer_amount
  reversal: exclude_is_reversed_true
metric_semantics: *id002
human_review:
  decision: revise
  current_name: dws_account_transfer_transaction_daily
  status: human_reviewed_candidate
