version: 2
name: dwd_loan_installment_version
layer: DWD
description: Semantic grain must identify schedule version and installment rather than only the surrogate
  id.
table_type: snapshot_fact
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: '04'
business_area: LOAN
entities:
- code: LOAN_INSTALLMENT_VERSION
  type: primary
  name: Loan Installment Version
  key_columns:
  - id
- code: LOAN_ACCOUNT
  type: foreign
  role: loan_account
  name: Loan Account
  key_columns:
  - loan_id
  source_fk:
  - loan_id
- code: LOAN_RESTRUCTURE_EVENT
  type: foreign
  role: restructure_request
  name: Loan Restructure Event
  key_columns:
  - loan_reschedule_request_id
  source_fk:
  - loan_reschedule_request_id
grain:
  description: one installment in one historical loan schedule version
  columns:
  - loan_id
  - loan_reschedule_request_id
  - version
  - installment
business_date:
  kind: due
  column: business_date
  inherit_from: null
  source_column: duedate
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_loan_repayment_schedule_history
  ods_table: ods_fineract_m_loan_repayment_schedule_history
  disposition: snapshot_source
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity: []
human_review:
  verdict: revise
  allowed_alternatives:
  - dwd_loan_schedule_version
business_process: loan_restructure
atomic_metrics:
- principal_amount
- interest_amount
- fee_charges_amount
- penalty_charges_amount
metric_semantics:
- name: principal_amount
  class: atomic
  aggregation_behavior: semi_additive
  formula: principal_amount
  unit: currency
  currency_source: account_currency
  additive_over: []
  sign: source_defined
  reversal: source_policy
- name: interest_amount
  class: atomic
  aggregation_behavior: semi_additive
  formula: interest_amount
  unit: currency
  currency_source: account_currency
  additive_over: []
  sign: source_defined
  reversal: source_policy
- name: fee_charges_amount
  class: atomic
  aggregation_behavior: semi_additive
  formula: fee_charges_amount
  unit: currency
  currency_source: account_currency
  additive_over: []
  sign: source_defined
  reversal: source_policy
- name: penalty_charges_amount
  class: atomic
  aggregation_behavior: semi_additive
  formula: penalty_charges_amount
  unit: currency
  currency_source: account_currency
  additive_over: []
  sign: source_defined
  reversal: source_policy
