version: 2
name: dwd_deposit_charge_allocation
layer: DWD
description: Allocation needs its parent transaction to provide business date and account context.
table_type: fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: business_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
  undated_row_policy: refresh_on_every_daily_run
data_domain: '05'
business_area: DPST
entities:
- code: DEPOSIT_CHARGE_ALLOCATION
  type: primary
  name: Deposit Charge Allocation
  key_columns:
  - id
- code: DEPOSIT_CHARGE
  type: foreign
  role: deposit_charge
  name: Deposit Charge
  key_columns:
  - savings_account_charge_id
  source_fk:
  - savings_account_charge_id
- code: DEPOSIT_TRANSACTION
  type: foreign
  role: deposit_transaction
  name: Deposit Transaction
  key_columns:
  - savings_account_transaction_id
  source_fk:
  - savings_account_transaction_id
grain:
  description: one deposit transaction-to-charge allocation
  columns:
  - savings_account_charge_id
  - savings_account_transaction_id
  - id
business_date:
  kind: inherited
  column: business_date
  inherit_from: m_savings_account_transaction.transaction_date
  source_column: null
source_mapping:
  upstream_repository: https://github.com/apache/fineract
  source_table: m_savings_account_charge_paid_by
  ods_table: ods_fineract_m_savings_account_charge_paid_by
  disposition: standalone_fact
  confidence: human_reviewed
sensitivity: restricted
sensitivity_policy:
  level: restricted
  action: mask_and_tokenize
column_sensitivity: []
human_review:
  verdict: revise
  allowed_alternatives: []
business_process: deposit_transaction
atomic_metrics:
- amount
metric_semantics:
- name: amount
  class: atomic
  aggregation_behavior: additive
  formula: amount
  unit: currency
  currency_source: account_currency
  additive_over:
  - savings_account_charge_id
  - savings_account_transaction_id
  - id
  sign: source_defined
  reversal: source_policy
