version: 2
name: ads_deposit_hold_kpi_daily
layer: ADS
description: 存款与储蓄 reviewed application data
table_type: application_fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: stat_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
data_domain: '05'
business_area: DPST
business_process: deposit_transaction
sensitivity: restricted
business_date:
  column: stat_date
  kind: inherited_event_date
grain:
  columns:
  - stat_date
  - savings_account_id
  - transaction_type_enum
  description: one day, deposit account and hold transaction type
  entities:
  - DEPOSIT_ACCOUNT
  degenerate_dimensions: &id001
  - transaction_type_enum
entities:
- code: DEPOSIT_ACCOUNT
  key: savings_account_id
degenerate_dimensions: *id001
derived_metrics:
- &id002
  name: record_count
  class: derived
  formula: source.record_count
  unit: count
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - savings_account_id
  - transaction_type_enum
  sign: positive_count
  reversal: inherited_source_policy
- &id003
  name: total_amount
  class: derived
  formula: source.total_amount
  unit: currency
  currency_source: dim_deposit_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - savings_account_id
  - transaction_type_enum
  sign: gross_by_transaction_type
  reversal: inherited_source_policy
calculated_metrics:
- &id004
  name: average_hold_amount
  class: calculated
  formula: total_amount / nullif(record_count, 0)
  unit: currency
  currency_source: dim_deposit_account.currency_code
  aggregation_behavior: non_additive
  additive_over: []
  sign: gross_by_transaction_type
  reversal: inherited_source_policy
metric_semantics:
- *id002
- *id003
- *id004
application_rules:
- name: average_hold_value
  kind: ratio
  formula: total_amount / nullif(record_count, 0)
  purpose: descriptive hold KPI; no monitoring claim
human_review:
  decision: revise
  current_name: ads_deposit_hold_monitor_daily
  status: human_reviewed_candidate
