version: 2
name: ads_customer_transaction_kpi_daily
layer: ADS
description: 客户与参与方 reviewed application data
table_type: application_fact
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: '01'
business_area: CLNT
business_process: customer_management
sensitivity: restricted
business_date:
  column: stat_date
  kind: inherited_event_date
grain:
  columns:
  - stat_date
  - office_id
  - client_id
  - currency_code
  - transaction_type_enum
  description: one day, office, customer, currency and transaction type
  entities:
  - OFFICE
  - CUSTOMER
  degenerate_dimensions: &id001
  - currency_code
  - transaction_type_enum
entities:
- code: OFFICE
  key: office_id
- code: CUSTOMER
  key: client_id
degenerate_dimensions: *id001
derived_metrics:
- &id002
  name: record_count
  class: derived
  formula: source.record_count
  unit: count
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - client_id
  - currency_code
  - transaction_type_enum
  sign: positive_count
  reversal: inherited_source_policy
- &id003
  name: total_amount
  class: derived
  formula: source.total_amount
  unit: currency
  currency_source: currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - client_id
  - transaction_type_enum
  sign: gross_by_transaction_type
  reversal: inherited_source_policy
calculated_metrics:
- &id004
  name: average_amount
  class: calculated
  formula: total_amount / nullif(record_count, 0)
  unit: currency
  currency_source: currency_code
  aggregation_behavior: non_additive
  additive_over: []
  sign: gross_by_transaction_type
  reversal: inherited_source_policy
metric_semantics:
- *id002
- *id003
- *id004
application_rules:
- name: average_customer_transaction_value
  kind: ratio
  formula: total_amount / nullif(record_count, 0)
  purpose: descriptive KPI only; not AML or anomaly monitoring
human_review:
  decision: revise
  current_name: ads_customer_transaction_monitor_daily
  status: human_reviewed_candidate
