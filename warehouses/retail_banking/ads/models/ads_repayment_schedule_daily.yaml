version: 2
name: ads_repayment_schedule_daily
layer: ADS
description: 贷款与信贷 reviewed application data
table_type: application_fact
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: '04'
business_area: LOAN
business_process: loan_repayment
sensitivity: restricted
business_date:
  column: stat_date
  kind: inherited_contractual_due_date
grain:
  columns:
  - stat_date
  - loan_id
  description: one contractual due day and loan
  entities:
  - LOAN_ACCOUNT
  degenerate_dimensions: []
entities:
- code: LOAN_ACCOUNT
  key: loan_id
degenerate_dimensions: []
derived_metrics:
- &id001
  name: installment_count
  class: derived
  formula: source.installment_count
  unit: count
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - loan_id
  sign: positive_count
  reversal: not_applicable
calculated_metrics:
- &id002
  name: scheduled_total_amount
  class: calculated
  formula: scheduled_principal_amount + scheduled_interest_amount + scheduled_fee_amount + scheduled_penalty_amount
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - loan_id
  sign: positive_scheduled
  reversal: not_applicable
- &id003
  name: average_scheduled_amount
  class: calculated
  formula: scheduled_total_amount / nullif(installment_count, 0)
  unit: currency
  currency_source: dim_loan_account.currency_code
  aggregation_behavior: non_additive
  additive_over: []
  sign: positive_scheduled
  reversal: not_applicable
metric_semantics:
- *id001
- *id002
- *id003
application_rules:
- name: scheduled_due_total
  kind: composition
  formula: principal + interest + fee + penalty
  purpose: repayment planning, not actual cash collection
human_review:
  decision: accept
  current_name: ads_repayment_schedule_daily
  status: human_reviewed_candidate
