version: 2
name: ads_share_transaction_kpi_daily
layer: ADS
description: 投资、份额与资产持有 reviewed application data
table_type: application_fact
execution:
  materialized: incremental
  full_refresh_strategy: companion
  slice:
    param: etl_date
    column: stat_date
    period: D
  late_arriving_policy: replay_original_and_current_business_dates
data_domain: 09
business_area: ASTM
business_process: share_account_management
sensitivity: restricted
business_date:
  column: stat_date
  kind: inherited_event_date
grain:
  columns:
  - stat_date
  - account_id
  - type_enum
  - status_enum
  description: one day, share account, transaction type and status
  entities:
  - SHARE_ACCOUNT
  degenerate_dimensions: &id001
  - type_enum
  - status_enum
entities:
- code: SHARE_ACCOUNT
  key: account_id
degenerate_dimensions: *id001
derived_metrics:
- &id002
  name: record_count
  class: derived
  formula: source.record_count
  unit: count
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - account_id
  - type_enum
  - status_enum
  sign: positive_count
  reversal: inherited_source_policy
- &id003
  name: total_shares
  class: derived
  formula: source.total_shares
  unit: shares
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - account_id
  - type_enum
  - status_enum
  sign: gross_by_transaction_type
  reversal: inherited_source_policy
- &id004
  name: total_amount
  class: derived
  formula: source.total_amount
  unit: currency
  currency_source: dim_share_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - account_id
  - type_enum
  - status_enum
  sign: gross_by_transaction_type
  reversal: inherited_source_policy
calculated_metrics:
- &id005
  name: average_share_price
  class: calculated
  formula: total_amount / nullif(total_shares, 0)
  unit: currency_per_share
  currency_source: dim_share_account.currency_code
  aggregation_behavior: non_additive
  additive_over: []
  sign: positive_price
  reversal: inherited_source_policy
- &id006
  name: paid_ratio
  class: calculated
  formula: total_amount_paid / nullif(total_amount, 0)
  unit: ratio
  currency_source: not_applicable
  aggregation_behavior: non_additive
  additive_over: []
  sign: positive_ratio
  reversal: inherited_source_policy
metric_semantics:
- *id002
- *id003
- *id004
- *id005
- *id006
application_rules:
- name: weighted_average_share_price
  kind: ratio
  formula: total_amount / nullif(total_shares, 0)
  purpose: descriptive share transaction KPI; no monitoring claim
human_review:
  decision: revise
  current_name: ads_share_transaction_monitor_daily
  status: human_reviewed_candidate
