version: 2
name: ads_deposit_transaction_kpi_daily
layer: ADS
description: 存款与储蓄 reviewed application data
table_type: application_fact
execution:
  materialized: full
  full_refresh_strategy: replace_all
data_domain: '05'
business_area: DPST
business_process: deposit_transaction
sensitivity: restricted
business_date:
  column: stat_date
  kind: inherited_event_date
grain:
  columns:
  - stat_date
  - office_id
  - savings_account_id
  - transaction_type_enum
  description: one day, office, deposit account and transaction type
  entities:
  - OFFICE
  - DEPOSIT_ACCOUNT
  degenerate_dimensions: &id001
  - transaction_type_enum
entities:
- code: OFFICE
  key: office_id
- code: DEPOSIT_ACCOUNT
  key: savings_account_id
degenerate_dimensions: *id001
derived_metrics:
- &id002
  name: record_count
  class: derived
  formula: source.record_count
  unit: count
  currency_source: not_applicable
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - savings_account_id
  - transaction_type_enum
  sign: positive_count
  reversal: inherited_source_policy
- &id003
  name: total_amount
  class: derived
  formula: source.total_amount
  unit: currency
  currency_source: dim_deposit_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - savings_account_id
  - transaction_type_enum
  sign: gross_by_transaction_type
  reversal: inherited_source_policy
- &id004
  name: total_overdraft_amount
  class: derived
  formula: source.total_overdraft_amount
  unit: currency
  currency_source: dim_deposit_account.currency_code
  aggregation_behavior: additive
  additive_over:
  - stat_date
  - office_id
  - savings_account_id
  - transaction_type_enum
  sign: positive_component
  reversal: inherited_source_policy
calculated_metrics:
- &id005
  name: average_amount
  class: calculated
  formula: total_amount / nullif(record_count, 0)
  unit: currency
  currency_source: dim_deposit_account.currency_code
  aggregation_behavior: non_additive
  additive_over: []
  sign: gross_by_transaction_type
  reversal: inherited_source_policy
- &id006
  name: overdraft_amount_ratio
  class: calculated
  formula: total_overdraft_amount / nullif(total_amount, 0)
  unit: ratio
  currency_source: not_applicable
  aggregation_behavior: non_additive
  additive_over: []
  sign: positive_ratio
  reversal: inherited_source_policy
metric_semantics:
- *id002
- *id003
- *id004
- *id005
- *id006
application_rules:
- name: average_transaction_value
  kind: ratio
  formula: total_amount / nullif(record_count, 0)
  purpose: deposit operations KPI
- name: overdraft_share
  kind: ratio
  formula: total_overdraft_amount / nullif(total_amount, 0)
  purpose: overdraft usage KPI
human_review:
  decision: revise
  current_name: ads_deposit_transaction_monitor_daily
  status: human_reviewed_candidate
