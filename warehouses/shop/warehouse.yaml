name: shop
catalog: internal
database: shop_dm
qa_database: shop_dm_qa
lineage_database: shop_lineage
naming_config: naming_config.yaml
schema_identity:
  required: true
verification:
  qa_database_pool:
    - shop_dm_qa
    - shop_dm_qa_02
  week_start: MON
  row_compare:
    exclude_columns:
      - etl_time
execution:
  default_slice:
    param: etl_date
    column: stat_date
    period: D
  full_refresh_window:
    start_param: etl_start_date
    end_param: etl_end_date
default_dialect: doris
ods_source_catalog_dialects:
  internal: doris
