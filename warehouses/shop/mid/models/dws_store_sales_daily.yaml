version: 2
name: dws_store_sales_daily
layer: DWS
table_type: fact
business_area: SHOP
description: 门店日销售汇总
execution:
  materialized: incremental
  full_refresh_strategy: companion
calculated_metrics:
- payment_amount
atomic_metrics:
- order_count
- customer_count
derived_metrics:
- name: total_amount
  base_metric: subtotal
  base_metric_table: dwd_order_detail
  time_period: D
  expression: SUM(subtotal)
  aggregation: SUM
- name: discount_amount
  base_metric: discount
  base_metric_table: dwd_order_detail
  time_period: D
  expression: SUM(discount)
  aggregation: SUM
grain:
  entities:
  - STORE
  time_column: stat_date
  time_period: D
entities:
- code: STORE
  type: foreign
  name: 门店
  key_columns:
  - store_id
business_process: ORDER_TRANSACTION
