version: 2
name: dws_account_daily_snapshot
layer: DWS
table_type: fact
config:
  materialized: full
atomic_metrics:
- current_balance
- available_balance
- credit_limit
- active_account_count
- closed_account_count
- dormant_account_count
- past_due_count
- near_limit_count
- account_count
derived_metrics:
- name: daily_transaction_count
  base_metric: transaction_count
  base_metric_table: dwd_transactions
  time_period: D
  expression: COUNT(*) GROUP BY account_id
  aggregation: COUNT
- name: daily_transaction_amount
  base_metric: amount
  base_metric_table: dwd_transactions
  time_period: D
  expression: SUM(amount) GROUP BY account_id
  aggregation: SUM
- name: daily_debit_count
  base_metric: debit_count
  base_metric_table: dwd_transactions
  time_period: D
  expression: SUM(CASE WHEN amount<0 THEN 1 ELSE 0 END) GROUP BY account_id
  aggregation: SUM
- name: daily_credit_count
  base_metric: credit_count
  base_metric_table: dwd_transactions
  time_period: D
  expression: SUM(CASE WHEN amount>0 THEN 1 ELSE 0 END) GROUP BY account_id
  aggregation: SUM
calculated_metrics:
- credit_utilization_pct
business_area: DPST
grain:
  entities:
  - ACCT
  time_column: snapshot_date
  time_period: D
entities:
- code: ACCT
  type: foreign
  name: 账户
  key_columns:
  - account_key
- code: CUST
  type: foreign
  name: 客户
  key_columns:
  - customer_key
- code: PROD
  type: foreign
  name: 产品
  key_columns:
  - product_key
