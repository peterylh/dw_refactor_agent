version: 2
name: dwd_accounts
layer: DWD
table_type: other
config:
  materialized: full
atomic_metrics:
- current_balance
- active_account_count
entities:
- code: ACCOUNT
  type: primary
  name: 账户
  key_columns:
  - account_id
- code: CUST
  type: foreign
  name: 客户
  key_columns:
  - customer_id
  relationship:
    type: many_to_one
    from_entity: ACCOUNT
- code: PROD
  type: foreign
  name: 产品
  key_columns:
  - product_id
  relationship:
    type: many_to_one
    from_entity: ACCOUNT
data_domain: '02'
business_area: DPST
