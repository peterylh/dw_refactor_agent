version: 2
name: dwd_accounts
layer: DWD
table_type: other
config:
  materialized: full
entities:
- code: ACCOUNT
  type: primary
  name: 账户
  key_columns:
  - account_id
- code: CUSTOMER
  type: foreign
  name: 客户
  key_columns:
  - customer_id
  relationship:
    type: many_to_one
    from_entity: ACCOUNT
- code: PRODUCT
  type: foreign
  name: 产品
  key_columns:
  - product_id
  relationship:
    type: many_to_one
    from_entity: ACCOUNT
