version: 1
project: finance_analytics
project_context: |
  finance_analytics 是一个银行与金融经营分析数据集市，覆盖客户经营、账户与交易、贷款申请与还款、营销活动、风险评估、反欺诈告警、监管报送和网点/渠道运营分析。
  核心维度实体包括客户、账户、金融产品、商户、营销活动、机构/网点/ATM、客户经理或坐席、日期以及宏观经济指标。
  核心事实来源包括账户交易、账户事件、贷款申请、贷款还款、客户互动、客户分层历史、营销活动触达与响应、风险评估、欺诈告警和监管报送记录。
  DWD 层应保留业务事件或快照明细粒度，DWS 层沉淀按日期、客户、账户、产品、商户、渠道、机构、营销活动或风险类别汇总的可复用指标。
  交易金额、账户余额、申请金额、还款金额、逾期天数、互动次数、告警数量、风险评分和监管报送数量等通常是基础或可汇总指标；风险等级、高价值标识、金额偏离评分、欺诈评分、响应率和转化率等通常是规则、模型或多指标组合形成的衍生指标。
