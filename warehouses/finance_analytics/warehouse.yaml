name: finance_analytics
catalog: internal
database: finance_analytics_dm
qa_database: finance_analytics_dm_qa
lineage_database: finance_analytics_lineage
naming_config: naming_config.yaml
verification:
  week_start: MON
  row_compare:
    exclude_columns:
      - etl_time
execution:
  default_slice:
    param: etl_date
    column: stat_date
    period: D
default_dialect: doris
ods_source_catalog_dialects:
  internal: doris
