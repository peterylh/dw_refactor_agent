version: 2
name: dwd_inventory
layer: DWD
table_type: fact
data_domain: '05'
business_area: SHOP
description: 库存每日快照
execution:
  materialized: incremental
atomic_metrics:
- quantity
entities:
- code: INVENTORY
  type: primary
  name: 库存记录
  key_columns:
  - inventory_id
- code: PROD
  type: foreign
  name: 商品
  key_columns:
  - product_id
- code: STORE
  type: foreign
  name: 门店
  key_columns:
  - store_id
business_process: INVENTORY_MANAGEMENT
calculated_metrics:
- days_since_restock
