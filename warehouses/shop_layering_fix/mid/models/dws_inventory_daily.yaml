version: 2
name: dws_inventory_daily
layer: DWS
table_type: fact
business_area: SHOP
description: 库存日汇总
execution:
  materialized: incremental
calculated_metrics:
- stock_status
- days_since_restock
derived_metrics:
- name: quantity
  base_metric: quantity
  base_metric_table: dwd_inventory
  time_period: D
  expression: SUM(dwd_inventory.quantity)
  aggregation: SUM
grain:
  entities:
  - PROD
  - STORE
  time_column: stat_date
  time_period: D
entities:
- code: PROD
  type: foreign
  name: 商品
  key_columns:
  - product_id
- code: STORE
  type: foreign
  name: 门店
  key_columns:
  - store_id
business_process: INVENTORY_MANAGEMENT
