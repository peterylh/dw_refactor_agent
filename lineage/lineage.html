<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据集市场字段级血缘分析</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f0f2f5; color:#1a1a2e; overflow:hidden; height:100vh; display:flex; flex-direction:column; }

/* Header */
.header { background:#fff; border-bottom:1px solid #e0e0e0; padding:10px 20px; display:flex; align-items:center; gap:16px; z-index:100; flex-shrink:0; }
.header h1 { font-size:18px; font-weight:600; color:#1a1a2e; white-space:nowrap; }
.header .stats { font-size:12px; color:#888; display:flex; gap:16px; }
.header .stats span { background:#f5f5f5; padding:3px 10px; border-radius:10px; }
.search-box { flex:1; max-width:400px; position:relative; }
.search-box input { width:100%; padding:7px 12px 7px 32px; border:1px solid #ddd; border-radius:6px; font-size:13px; outline:none; }
.search-box input:focus { border-color:#4a6cf7; box-shadow:0 0 0 2px rgba(74,108,247,0.1); }
.search-box .search-icon { position:absolute; left:10px; top:7px; color:#999; font-size:14px; }
.filter-group { display:flex; gap:6px; }
.filter-btn { padding:5px 12px; border:1px solid #ddd; border-radius:6px; font-size:12px; cursor:pointer; background:#fff; color:#555; transition:all .15s; }
.filter-btn:hover { border-color:#aaa; }
.filter-btn.active { color:#fff; font-weight:500; }
.filter-btn.ods.active { background:#52c41a; border-color:#52c41a; }
.filter-btn.dwd.active { background:#1890ff; border-color:#1890ff; }
.filter-btn.dws.active { background:#fa8c16; border-color:#fa8c16; }
.filter-btn.ads.active { background:#f5222d; border-color:#f5222d; }
.btn { padding:6px 14px; border:1px solid #ddd; border-radius:6px; font-size:12px; cursor:pointer; background:#fff; color:#555; }
.btn:hover { background:#f5f5f5; }
.btn.primary { background:#4a6cf7; color:#fff; border-color:#4a6cf7; }
.btn.primary:hover { background:#3b5de7; }

/* Main layout */
.main { display:flex; flex:1; overflow:hidden; position:relative; }
.canvas-wrap { flex:1; overflow:auto; position:relative; background:#fafbfc; }
.canvas-wrap svg { display:block; }

/* Right panel */
.side-panel { width:340px; background:#fff; border-left:1px solid #e0e0e0; display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
.side-panel .panel-header { padding:12px 16px; border-bottom:1px solid #eee; font-size:14px; font-weight:600; color:#333; display:flex; align-items:center; justify-content:space-between; }
.side-panel .panel-body { flex:1; overflow-y:auto; padding:12px 16px; }
.side-panel .close-btn { cursor:pointer; font-size:18px; color:#999; line-height:1; }
.side-panel .close-btn:hover { color:#333; }

/* Detail */
.detail-empty { text-align:center; color:#bbb; padding:40px 0; font-size:13px; }
.detail-table { width:100%; font-size:12px; border-collapse:collapse; margin-top:8px; }
.detail-table td { padding:6px 8px; border-bottom:1px solid #f0f0f0; vertical-align:top; }
.detail-table td.label { color:#888; white-space:nowrap; width:70px; }
.detail-table td.value { color:#333; word-break:break-all; }
.detail-card { background:#f9f9fb; border:1px solid #eee; border-radius:8px; padding:12px; margin-bottom:10px; }
.detail-card h4 { font-size:13px; color:#333; margin-bottom:8px; }
.expr-box { font-family: "SF Mono","Menlo","Monaco",monospace; font-size:12px; background:#1e1e2e; color:#a6e3a1; padding:10px; border-radius:6px; overflow-x:auto; white-space:pre-wrap; word-break:break-all; margin-top:4px; }
.path-list { list-style:none; padding:0; }
.path-list li { padding:5px 0; border-bottom:1px solid #f5f5f5; font-size:12px; display:flex; align-items:center; gap:6px; }
.path-list li:last-child { border-bottom:none; }
.path-badge { display:inline-block; padding:1px 6px; border-radius:3px; font-size:11px; color:#fff; }
.path-badge.ods { background:#52c41a; }
.path-badge.dwd { background:#1890ff; }
.path-badge.dws { background:#fa8c16; }
.path-badge.ads { background:#f5222d; }
.path-arrow { color:#aaa; margin:0 4px; }

/* Tooltip */
.tooltip { position:absolute; pointer-events:none; background:rgba(0,0,0,0.85); color:#fff; padding:8px 12px; border-radius:6px; font-size:12px; max-width:300px; z-index:200; display:none; }
.tooltip .tt-expr { font-family:monospace; color:#a6e3a1; margin-top:4px; }

/* Minimap */
.minimap { position:absolute; bottom:12px; right:12px; border:1px solid #ddd; border-radius:4px; background:rgba(255,255,255,0.8); z-index:50; }

/* Legend */
.legend { position:absolute; top:12px; right:12px; background:#fff; border:1px solid #eee; border-radius:8px; padding:8px 12px; font-size:11px; z-index:50; }
.legend-item { display:flex; align-items:center; gap:6px; margin:3px 0; }
.legend-dot { width:10px; height:10px; border-radius:50%; }
</style>
</head>

<div class="header">
  <h1>字段级数据血缘</h1>
  <div class="stats">
    <span id="stat-nodes">节点: --</span>
    <span id="stat-edges">血缘: --</span>
    <span id="stat-tables">表: --</span>
  </div>
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="搜索表名或字段...">
  </div>
  <div class="filter-group" id="filter-group">
    <button class="filter-btn ods active" data-layer="ODS">ODS</button>
    <button class="filter-btn dwd active" data-layer="DWD">DWD</button>
    <button class="filter-btn dws active" data-layer="DWS">DWS</button>
    <button class="filter-btn ads active" data-layer="ADS">ADS</button>
  </div>
  <button class="btn" id="btn-expand-all">展开全部</button>
  <button class="btn" id="btn-collapse-all">折叠全部</button>
  <button class="btn" id="btn-fit">适应画面</button>
  <button class="btn primary" id="btn-export">导出图片</button>
</div>

<div class="main">
  <div class="canvas-wrap" id="canvas-wrap">
    <svg id="main-svg"></svg>
  </div>

  <div class="side-panel" id="side-panel">
    <div class="panel-header">
      <span id="panel-title">血缘详情</span>
      <span class="close-btn" id="panel-close">&times;</span>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="detail-empty">点击图中节点或连线查看详情</div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ==================== DATA LOADING ====================
const LAYER_COLORS = { ODS:"#52c41a", DWD:"#1890ff", DWS:"#fa8c16", ADS:"#f5222d", OTHER:"#999" };
const LAYER_BG = { ODS:"#f6ffed", DWD:"#e6f7ff", DWS:"#fff7e6", ADS:"#fff1f0", OTHER:"#fafafa" };
const LAYER_ORDER = { ODS:0, DWD:1, DWS:2, ADS:3, OTHER:4 };

let data = null;
let activeLayers = new Set(["ODS","DWD","DWS","ADS"]);
let selectedColumnId = null;
let searchQuery = "";
let expandedTables = new Set();

// Layout constants
const LAYER_X = { ODS:80, DWD:380, DWS:680, ADS:980 };
const TABLE_GAP = 16;
const COL_ROW_H = 22;
const TABLE_HEADER_H = 36;
const TABLE_MIN_WIDTH = 220;
const TABLE_PADDING_X = 12;
const COL_FONT_SIZE = 11;
const HEADER_RIGHT_PAD = 80; // space for badge + expand icon

// Store computed positions
let tablePositions = {};
let columnPositions = {};

// Zoom behavior
let zoom, svg, mainGroup;

Promise.resolve(LINEAGE_DATA).then((json) => {
  data = json;
  document.getElementById("stat-nodes").textContent = `节点: ${data.nodes.length}`;
  document.getElementById("stat-edges").textContent = `血缘: ${data.edges.length}`;
  document.getElementById("stat-tables").textContent = `表: ${data.tables.length}`;
  init();
}).catch(err => {
  document.body.innerHTML = `<div style="padding:40px;text-align:center;color:red;">数据加载失败: ${err.message}<br>请确保 lineage_data.json 与此 HTML 在同一目录</div>`;
});

// ==================== INITIALIZATION ====================
function init() {
  const wrap = document.getElementById("canvas-wrap");
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  svg = d3.select("#main-svg")
    .attr("width", W)
    .attr("height", H);

  // Define arrowhead marker
  const defs = svg.append("defs");
  defs.append("marker")
    .attr("id", "arrowhead")
    .attr("viewBox", "0 0 10 7")
    .attr("refX", 10)
    .attr("refY", 3.5)
    .attr("markerWidth", 8)
    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,0 L10,3.5 L0,7 Z")
    .attr("fill", "#bbb");

  // Shadow filter
  const filter = defs.append("filter").attr("id", "drop-shadow");
  filter.append("feDropShadow").attr("dx",0).attr("dy",1).attr("stdDeviation",2).attr("flood-opacity",0.1);

  mainGroup = svg.append("g").attr("class","main-group");

  zoom = d3.zoom()
    .scaleExtent([0.15, 3])
    .on("zoom", (event) => {
      mainGroup.attr("transform", event.transform);
    });
  svg.call(zoom);

  computeLayout();
  render();

  // Events
  document.getElementById("search").addEventListener("input", (e) => {
    searchQuery = e.target.value.toLowerCase();
    render();
  });

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const layer = btn.dataset.layer;
      if (activeLayers.has(layer)) {
        activeLayers.delete(layer);
        btn.classList.remove("active");
      } else {
        activeLayers.add(layer);
        btn.classList.add("active");
      }
      computeLayout();
      render();
    });
  });

  document.getElementById("btn-expand-all").onclick = () => {
    data.tables.forEach(t => expandedTables.add(t.name));
    computeLayout();
    render();
  };
  document.getElementById("btn-collapse-all").onclick = () => {
    expandedTables.clear();
    selectedColumnId = null;
    computeLayout();
    render();
    updatePanel(null);
  };
  document.getElementById("btn-fit").onclick = () => fitToScreen();
  document.getElementById("btn-export").onclick = exportPNG;
  document.getElementById("panel-close").onclick = () => updatePanel(null);

  fitToScreen();
}

// ==================== LAYOUT ====================
function computeLayout() {
  tablePositions = {};
  columnPositions = {};

  // Filter visible tables
  const visibleTables = data.tables.filter(t => activeLayers.has(t.layer));

  // Group by layer, sort by name
  const layerGroups = {};
  visibleTables.forEach(t => {
    const layer = t.layer;
    if (!layerGroups[layer]) layerGroups[layer] = [];
    layerGroups[layer].push(t);
  });
  Object.values(layerGroups).forEach(g => g.sort((a,b) => a.name.localeCompare(b.name)));

  // Compute table positions within each layer
  const SVG_H = Math.max(document.getElementById("canvas-wrap").clientHeight, 800);
  const SVG_W = 1400;

  let globalMaxY = 0;

  for (const [layer, tables] of Object.entries(layerGroups)) {
    const x = LAYER_X[layer] || 80;
    const expanded = tables.filter(t => expandedTables.has(t.name));
    const collapsed = tables.filter(t => !expandedTables.has(t.name));

    // Collapsed height = header only
    const collapsedH = TABLE_HEADER_H;

    // Calculate total height needed for this layer
    let totalTableH = 0;
    tables.forEach(t => {
      if (expandedTables.has(t.name)) {
        const cols = t.columns.filter(c => matchesSearch(t.name, c.name));
        totalTableH += TABLE_HEADER_H + cols.length * COL_ROW_H + 8;
      } else {
        totalTableH += collapsedH;
      }
    });
    totalTableH += (tables.length - 1) * TABLE_GAP;

    const startY = Math.max(40, (SVG_H - totalTableH) / 2);

    // Lay out tables vertically
    let cy = startY;
    tables.forEach(t => {
      const isExpanded = expandedTables.has(t.name);
      const cols = t.columns.filter(c => matchesSearch(t.name, c.name));
      const h = isExpanded ? TABLE_HEADER_H + cols.length * COL_ROW_H + 8 : collapsedH;

      // Compute width based on content
      let w = TABLE_MIN_WIDTH;
      if (isExpanded) {
        // Need space for: [dot] col_name ... [col_type] [dot]
        // Estimate max row width = max(col_name_w + type_w) + margins
        let maxRowW = 0;
        cols.forEach(c => {
          const typeW = (c.type && c.type !== "UNKNOWN") ? measureText(c.type, 9) + 12 : 0;
          const nameW = measureText(c.name, COL_FONT_SIZE);
          maxRowW = Math.max(maxRowW, nameW + typeW);
        });
        w = Math.max(TABLE_MIN_WIDTH, maxRowW + 48, measureText(t.name, 13) + HEADER_RIGHT_PAD + 16);
      } else {
        w = Math.max(TABLE_MIN_WIDTH, measureText(t.name, 13) + HEADER_RIGHT_PAD + 16);
      }

      tablePositions[t.name] = { x, y:cy, w, h, layer, isExpanded, ncols: cols.length };
      globalMaxY = Math.max(globalMaxY, cy + h);

      // Column positions (relative to table)
      if (isExpanded) {
        const colStartY = cy + TABLE_HEADER_H + 4;
        cols.forEach((c, i) => {
          const cid = `${t.name}.${c.name}`;
          columnPositions[cid] = {
            x1: x, x2: x + w,
            y: colStartY + i * COL_ROW_H + COL_ROW_H / 2,
            table: t.name, column: c.name, layer
          };
        });
      }

      cy += h + TABLE_GAP;
    });
  }

  svg.attr("width", SVG_W).attr("height", Math.max(SVG_H, globalMaxY + 60));
}

function measureText(text, fontSize) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  ctx.font = `${fontSize}px -apple-system, sans-serif`;
  return ctx.measureText(text).width;
}

function matchesSearch(tableName, colName) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return tableName.toLowerCase().includes(q) || (colName && colName.toLowerCase().includes(q));
}

// ==================== RENDERING ====================
function render() {
  mainGroup.selectAll("*").remove();

  // Edge group (drawn first, below tables)
  const edgeGroup = mainGroup.append("g").attr("class","edges");

  // Table group
  const tableGroup = mainGroup.append("g").attr("class","tables");

  // Draw edges
  const visibleEdges = data.edges.filter(e => {
    const srcParts = e.source.split(".");
    const tgtParts = e.target.split(".");
    if (srcParts.length < 2 || tgtParts.length < 2) return false;

    const srcTable = srcParts.slice(0, -1).join(".");
    const srcCol = srcParts[srcParts.length - 1];
    const tgtTable = tgtParts.slice(0, -1).join(".");
    const tgtCol = tgtParts[tgtParts.length - 1];

    // Layer filter
    const srcNode = data.nodes.find(n => n.id === e.source);
    const tgtNode = data.nodes.find(n => n.id === e.target);
    if (!srcNode || !tgtNode) return false;
    if (!activeLayers.has(srcNode.layer) || !activeLayers.has(tgtNode.layer)) return false;

    // Search filter
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!srcTable.toLowerCase().includes(q) && !srcCol.toLowerCase().includes(q) &&
          !tgtTable.toLowerCase().includes(q) && !tgtCol.toLowerCase().includes(q)) return false;
    }

    return true;
  });

  // Separate edges into table-level and column-level
  // If a column is selected, show all edges for that column; otherwise show table-level edges
  const tableEdgeMap = new Map(); // "srcTable->tgtTable" -> [edges]
  visibleEdges.forEach(e => {
    const srcTable = e.source.split(".").slice(0, -1).join(".");
    const tgtTable = e.target.split(".").slice(0, -1).join(".");
    const key = `${srcTable}->${tgtTable}`;
    if (!tableEdgeMap.has(key)) tableEdgeMap.set(key, []);
    tableEdgeMap.get(key).push(e);
  });

  // Draw edges
  tableEdgeMap.forEach((edges, key) => {
    const [srcTable, tgtTable] = key.split("->");
    const srcPos = tablePositions[srcTable];
    const tgtPos = tablePositions[tgtTable];
    if (!srcPos || !tgtPos) return;

    // Check if we should draw column-level edges
    const isExpanded = expandedTables.has(srcTable) && expandedTables.has(tgtTable);
    const hasSelected = selectedColumnId && edges.some(e => e.source === selectedColumnId || e.target === selectedColumnId);

    if ((isExpanded || hasSelected) && edges.length <= 20) {
      // Draw column-level edges
      edges.forEach(e => {
        const srcColId = e.source;
        const tgtColId = e.target;
        const srcCPos = columnPositions[srcColId];
        const tgtCPos = columnPositions[tgtColId];

        if (srcCPos && tgtCPos) {
          const sx = srcCPos.x2;
          const sy = srcCPos.y;
          const tx = tgtCPos.x1;
          const ty = tgtCPos.y;

          const isHighlighted = selectedColumnId === srcColId || selectedColumnId === tgtColId;
          const opacity = selectedColumnId ? (isHighlighted ? 1 : 0.08) : 0.6;

          drawEdge(edgeGroup, sx, sy, tx, ty, {
            stroke: isHighlighted ? LAYER_COLORS[tgtPos.layer] : "#bbb",
            strokeWidth: isHighlighted ? 2 : 0.8,
            opacity,
            expression: e.expression
          });
        }
      });
    } else {
      // Draw table-level edge (bundle)
      // Source: right center of src table
      let sy1, sy2;
      if (srcPos.isExpanded) {
        sy1 = srcPos.y + TABLE_HEADER_H + 4;
        sy2 = srcPos.y + srcPos.h - 4;
      } else {
        sy1 = srcPos.y + 8;
        sy2 = srcPos.y + srcPos.h - 8;
      }
      const sx = srcPos.x + srcPos.w;

      let ty1, ty2;
      if (tgtPos.isExpanded) {
        ty1 = tgtPos.y + TABLE_HEADER_H + 4;
        ty2 = tgtPos.y + tgtPos.h - 4;
      } else {
        ty1 = tgtPos.y + 8;
        ty2 = tgtPos.y + tgtPos.h - 8;
      }
      const tx = tgtPos.x;

      const isHighlighted = selectedColumnId &&
        (selectedColumnId.startsWith(srcTable + ".") || selectedColumnId.startsWith(tgtTable + "."));
      const opacity = selectedColumnId ? (isHighlighted ? 0.9 : 0.05) : 0.5;

      drawBundledEdge(edgeGroup, sx, sy1, sy2, tx, ty1, ty2, {
        stroke: isHighlighted ? LAYER_COLORS[tgtPos.layer] : "#aaa",
        strokeWidth: isHighlighted ? 2.5 : 1.5,
        opacity,
        count: edges.length,
        expression: edges[0]?.expression
      });
    }
  });

  // Draw tables
  Object.entries(tablePositions).forEach(([tname, pos]) => {
    const table = data.tables.find(t => t.name === tname);
    if (!table) return;

    const g = tableGroup.append("g")
      .attr("class", "table-node")
      .attr("transform", `translate(${pos.x},${pos.y})`)
      .attr("data-table", tname)
      .style("cursor","pointer");

    // Table background
    const rect = g.append("rect")
      .attr("width", pos.w)
      .attr("height", pos.h)
      .attr("rx", 8)
      .attr("ry", 8)
      .attr("fill", "#fff")
      .attr("stroke", LAYER_COLORS[pos.layer])
      .attr("stroke-width", pos.isExpanded ? 2 : 1.5)
      .attr("filter", "url(#drop-shadow)");

    // Layer stripe
    g.append("rect")
      .attr("width", 4)
      .attr("height", pos.h)
      .attr("rx", 2)
      .attr("fill", LAYER_COLORS[pos.layer]);

    // Table header
    const headerG = g.append("g").attr("class","table-header");

    headerG.append("rect")
      .attr("x", 4).attr("y", 0)
      .attr("width", pos.w - 4).attr("height", TABLE_HEADER_H)
      .attr("rx", 6)
      .attr("fill", LAYER_BG[pos.layer]);

    // Table name (truncate if too long)
    const nameMaxW = pos.w - 16 - HEADER_RIGHT_PAD;
    let displayName = table.name;
    if (measureText(displayName, 13) > nameMaxW) {
      while (displayName.length > 8 && measureText(displayName + "…", 13) > nameMaxW) {
        displayName = displayName.slice(0, -1);
      }
      displayName += "…";
    }
    headerG.append("text")
      .attr("x", 14).attr("y", 24)
      .text(displayName)
      .attr("font-size", 13)
      .attr("font-weight", "600")
      .attr("fill", "#1a1a2e")
      .append("title").text(table.name);

    // Expand/collapse icon
    const iconText = pos.isExpanded ? "▾" : "▸";
    headerG.append("text")
      .attr("x", pos.w - 12).attr("y", 24)
      .text(iconText)
      .attr("font-size", 12)
      .attr("fill", "#999")
      .attr("text-anchor", "middle");

    // Column count badge
    const badgeW = measureText(`${pos.ncols} 列`, 10) + 10;
    const badgeX = pos.w - 26 - badgeW;
    headerG.append("rect")
      .attr("x", badgeX).attr("y", 12)
      .attr("width", badgeW).attr("height", 16)
      .attr("rx", 8)
      .attr("fill", LAYER_COLORS[pos.layer])
      .attr("opacity", 0.15);
    headerG.append("text")
      .attr("x", badgeX + badgeW/2).attr("y", 23)
      .text(`${pos.ncols} 列`)
      .attr("font-size", 10)
      .attr("fill", LAYER_COLORS[pos.layer])
      .attr("text-anchor", "middle");

    // Click on header
    headerG.on("click", (event) => {
      event.stopPropagation();
      if (expandedTables.has(tname)) {
        expandedTables.delete(tname);
      } else {
        expandedTables.add(tname);
      }
      computeLayout();
      render();
    });

    // Columns
    if (pos.isExpanded) {
      const cols = table.columns.filter(c => matchesSearch(tname, c.name));
      const colGroup = g.append("g").attr("class","columns");

      cols.forEach((c, i) => {
        const cy = TABLE_HEADER_H + 4 + i * COL_ROW_H;
        const colId = `${tname}.${c.name}`;
        const isSelected = selectedColumnId === colId;

        const rowG = colGroup.append("g")
          .attr("class","column-row")
          .attr("transform", `translate(0,${cy})`)
          .attr("data-column-id", colId)
          .style("cursor","pointer");

        // Row background
        if (isSelected) {
          rowG.append("rect")
            .attr("x", 4).attr("y", -1)
            .attr("width", pos.w - 8).attr("height", COL_ROW_H - 1)
            .attr("rx", 4)
            .attr("fill", LAYER_COLORS[pos.layer])
            .attr("opacity", 0.12);
        }

        // Hover effect
        rowG.append("rect")
          .attr("x", 4).attr("y", -1)
          .attr("width", pos.w - 8).attr("height", COL_ROW_H - 1)
          .attr("rx", 4)
          .attr("fill", "transparent")
          .on("mouseenter", function() {
            if (!isSelected) d3.select(this).attr("fill", "#f0f0f0");
          })
          .on("mouseleave", function() {
            if (!isSelected) d3.select(this).attr("fill", "transparent");
          });

        // Connection dot (left side)
        const hasIncoming = data.edges.some(e => e.target === colId);
        if (hasIncoming) {
          rowG.append("circle")
            .attr("cx", 8).attr("cy", COL_ROW_H/2)
            .attr("r", 3)
            .attr("fill", LAYER_COLORS[pos.layer]);
        }

        // Column type is drawn first (right-aligned) so we know remaining space for name
        let typeW = 0;
        if (c.type && c.type !== "UNKNOWN") {
          typeW = measureText(c.type, 9) + 16; // leave right margin
          rowG.append("text")
            .attr("x", pos.w - 10).attr("y", COL_ROW_H/2 + 4)
            .text(c.type)
            .attr("font-size", 9)
            .attr("fill", "#aaa")
            .attr("text-anchor", "end");
        }

        // Column name - truncate if too long
        const nameMaxW = pos.w - 40 - typeW;
        let colDisplayName = c.name;
        if (measureText(colDisplayName, COL_FONT_SIZE) > nameMaxW) {
          while (colDisplayName.length > 3 && measureText(colDisplayName + "…", COL_FONT_SIZE) > nameMaxW) {
            colDisplayName = colDisplayName.slice(0, -1);
          }
          colDisplayName += "…";
        }
        const nameText = rowG.append("text")
          .attr("x", 18).attr("y", COL_ROW_H/2 + 4)
          .text(colDisplayName)
          .attr("font-size", COL_FONT_SIZE)
          .attr("fill", isSelected ? LAYER_COLORS[pos.layer] : "#333")
          .attr("font-weight", isSelected ? "600" : "400");
        if (colDisplayName !== c.name) {
          nameText.append("title").text(c.name);
        }

        // Connection dot (right side)
        const hasOutgoing = data.edges.some(e => e.source === colId);
        if (hasOutgoing) {
          rowG.append("circle")
            .attr("cx", pos.w - 8).attr("cy", COL_ROW_H/2)
            .attr("r", 3)
            .attr("fill", LAYER_COLORS[pos.layer]);
        }

        // Click on column
        rowG.on("click", (event) => {
          event.stopPropagation();
          if (selectedColumnId === colId) {
            selectedColumnId = null;
          } else {
            selectedColumnId = colId;
          }
          computeLayout();
          render();
          updatePanel(colId);
        });
      });
    }

    // Drag behavior
    g.call(d3.drag()
      .on("drag", (event) => {
        pos.x += event.dx;
        pos.y += event.dy;
        d3.select(this).attr("transform", `translate(${pos.x},${pos.y})`);
        // Redraw edges
        render();
      })
    );
  });

  // Update column positions for edge drawing
  computeLayout();
}

// ==================== EDGE DRAWING ====================
function drawEdge(group, sx, sy, tx, ty, opts={}) {
  const dx = tx - sx;
  const cp = Math.max(30, Math.abs(dx) * 0.4);

  const path = d3.path();
  path.moveTo(sx, sy);
  path.bezierCurveTo(sx + cp, sy, tx - cp, ty, tx, ty);

  const line = group.append("path")
    .attr("d", path.toString())
    .attr("fill", "none")
    .attr("stroke", opts.stroke || "#bbb")
    .attr("stroke-width", opts.strokeWidth || 1)
    .attr("opacity", opts.opacity || 0.5)
    .attr("marker-end", "url(#arrowhead)");

  if (opts.expression) {
    line.on("mouseenter", (event) => showTooltip(event, opts.expression));
    line.on("mouseleave", hideTooltip);
    line.on("click", (event) => {
      event.stopPropagation();
      updatePanelEdge(opts.expression);
    });
  }

  return line;
}

function drawBundledEdge(group, sx, sy1, sy2, tx, ty1, ty2, opts={}) {
  const smy = (sy1 + sy2) / 2;
  const tmy = (ty1 + ty2) / 2;
  const dx = tx - sx;
  const cp = Math.max(40, Math.abs(dx) * 0.35);

  const path = d3.path();
  path.moveTo(sx, smy);
  path.bezierCurveTo(sx + cp, smy, tx - cp, tmy, tx, tmy);

  const line = group.append("path")
    .attr("d", path.toString())
    .attr("fill", "none")
    .attr("stroke", opts.stroke || "#aaa")
    .attr("stroke-width", opts.strokeWidth || 1.5)
    .attr("opacity", opts.opacity || 0.5)
    .attr("marker-end", "url(#arrowhead)");

  // Label with count
  const midX = sx + dx/2;
  const midY = (smy + tmy) / 2 - 6;
  if (opts.count && opts.count > 1) {
    group.append("text")
      .attr("x", midX).attr("y", midY)
      .attr("text-anchor","middle")
      .attr("font-size","9")
      .attr("fill","#999")
      .text(`${opts.count} 字段`);
  }

  if (opts.expression) {
    line.on("mouseenter", (event) => showTooltip(event, opts.expression));
    line.on("mouseleave", hideTooltip);
  }

  return line;
}

// ==================== TOOLTIP ====================
function showTooltip(event, expr) {
  const tip = document.getElementById("tooltip");
  tip.innerHTML = `<div>${expr}</div>`;
  tip.style.display = "block";
  tip.style.left = (event.pageX + 12) + "px";
  tip.style.top = (event.pageY - 30) + "px";
}

function hideTooltip() {
  document.getElementById("tooltip").style.display = "none";
}

// ==================== SIDE PANEL ====================
function updatePanel(columnId) {
  const body = document.getElementById("panel-body");
  const title = document.getElementById("panel-title");

  if (!columnId) {
    title.textContent = "血缘详情";
    body.innerHTML = '<div class="detail-empty">点击图中节点或连线查看详情</div>';
    return;
  }

  title.textContent = "字段血缘详情";

  const parts = columnId.split(".");
  const colName = parts[parts.length - 1];
  const tblName = parts.slice(0, -1).join(".");
  const node = data.nodes.find(n => n.id === columnId);

  // Find upstream (this column as target)
  const upstream = data.edges.filter(e => e.target === columnId);

  // Find downstream (this column as source)
  const downstream = data.edges.filter(e => e.source === columnId);

  let html = "";

  // Column info
  html += `<div class="detail-card">
    <h4>选中字段</h4>
    <table class="detail-table">
      <tr><td class="label">表名</td><td class="value">${tblName}</td></tr>
      <tr><td class="label">字段</td><td class="value" style="font-weight:600;color:${LAYER_COLORS[node?.layer||'OTHER']}">${colName}</td></tr>
      <tr><td class="label">层级</td><td class="value"><span class="path-badge ${(node?.layer||'OTHER').toLowerCase()}">${node?.layer||'?'}</span></td></tr>
    </table>
  </div>`;

  // Upstream lineage
  if (upstream.length > 0) {
    html += `<div class="detail-card">
      <h4>上游血缘 (${upstream.length})</h4>
      <ul class="path-list">`;
    upstream.forEach(e => {
      const srcParts = e.source.split(".");
      const srcCol = srcParts[srcParts.length - 1];
      const srcTbl = srcParts.slice(0, -1).join(".");
      const srcNode = data.nodes.find(n => n.id === e.source);
      html += `<li>
        <span class="path-badge ${(srcNode?.layer||'OTHER').toLowerCase()}">${srcNode?.layer||'?'}</span>
        <span style="font-weight:500">${srcTbl}</span>.${srcCol}
        <span class="path-arrow">→</span>
        <strong>${colName}</strong>
      </li>
      <li style="padding-left:20px;">
        <div class="expr-box">${escapeHtml(e.expression)}</div>
      </li>`;
    });
    html += `</ul></div>`;
  }

  // Downstream lineage
  if (downstream.length > 0) {
    html += `<div class="detail-card">
      <h4>下游引用 (${downstream.length})</h4>
      <ul class="path-list">`;
    downstream.forEach(e => {
      const tgtParts = e.target.split(".");
      const tgtCol = tgtParts[tgtParts.length - 1];
      const tgtTbl = tgtParts.slice(0, -1).join(".");
      const tgtNode = data.nodes.find(n => n.id === e.target);
      html += `<li>
        <strong>${colName}</strong>
        <span class="path-arrow">→</span>
        <span class="path-badge ${(tgtNode?.layer||'OTHER').toLowerCase()}">${tgtNode?.layer||'?'}</span>
        <span style="font-weight:500">${tgtTbl}</span>.${tgtCol}
      </li>
      <li style="padding-left:20px;">
        <div class="expr-box">${escapeHtml(e.expression)}</div>
      </li>`;
    });
    html += `</ul></div>`;
  }

  // Full lineage path
  if (upstream.length > 0 || downstream.length > 0) {
    html += `<div class="detail-card">
      <h4>完整血缘路径</h4>
      <div style="font-size:12px;line-height:1.8;">`;
    const path = buildLineagePath(columnId);
    path.forEach((item, i) => {
      const badge = item.layer ? `<span class="path-badge ${item.layer.toLowerCase()}">${item.layer}</span>` : "";
      html += `<div>${badge} ${item.table}.<strong>${item.column}</strong></div>`;
      if (i < path.length - 1) html += `<div style="padding-left:12px;color:#aaa;">↓</div>`;
    });
    html += `</div></div>`;
  }

  body.innerHTML = html;

  // Make upstream/downstream columns clickable
  body.querySelectorAll(".path-list li").forEach(li => {
    li.style.cursor = "pointer";
    li.addEventListener("click", () => {
      // Extract column info and navigate
      // ... (simplified)
    });
  });
}

function updatePanelEdge(expr) {
  const body = document.getElementById("panel-body");
  const title = document.getElementById("panel-title");
  title.textContent = "转换逻辑";
  body.innerHTML = `
    <div class="detail-card">
      <h4>转换表达式</h4>
      <div class="expr-box">${escapeHtml(expr)}</div>
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function buildLineagePath(columnId) {
  // BFS to find root
  let current = columnId;
  const pathNodes = [];

  // Go upstream first
  const upstreamPath = [];
  const visited = new Set();
  const queue = [columnId];
  while (queue.length > 0) {
    const cur = queue.shift();
    if (visited.has(cur)) continue;
    visited.add(cur);
    const incoming = data.edges.filter(e => e.target === cur);
    if (incoming.length === 0) {
      upstreamPath.unshift(cur);
    } else {
      incoming.forEach(e => {
        if (!visited.has(e.source)) queue.push(e.source);
      });
      if (incoming.length === 1) upstreamPath.unshift(cur);
    }
  }

  // Convert to display
  return upstreamPath.map(id => {
    const parts = id.split(".");
    const node = data.nodes.find(n => n.id === id);
    return {
      table: parts.slice(0, -1).join("."),
      column: parts[parts.length - 1],
      layer: node?.layer || "?"
    };
  });
}

function fitToScreen() {
  const wrap = document.getElementById("canvas-wrap");
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity.translate(20, 20).scale(0.55));
}

function exportPNG() {
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svg.node());
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const img = new Image();
  const blob = new Blob([svgStr], {type:"image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(blob);

  img.onload = () => {
    canvas.width = svg.attr("width") * 2;
    canvas.height = svg.attr("height") * 2;
    ctx.fillStyle = "#fafbfc";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(2, 2);
    ctx.drawImage(img, 0, 0);
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "lineage.png";
    a.click();
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

// Handle click on empty area
svg.on("click", (event) => {
  if (event.target === svg.node()) {
    selectedColumnId = null;
    computeLayout();
    render();
    updatePanel(null);
  }
});
