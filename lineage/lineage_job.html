<!DOCTYPE html>

<title>数据血缘分析 — 作业级 & 字段级</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f0f2f5; color:#1a1a2e; overflow:hidden; height:100vh; display:flex; flex-direction:column; }

.header { background:#fff; border-bottom:1px solid #e0e0e0; padding:10px 20px; display:flex; align-items:center; gap:16px; z-index:100; flex-shrink:0; flex-wrap:wrap; }
.header h1 { font-size:18px; font-weight:600; color:#1a1a2e; white-space:nowrap; }
.header .stats { font-size:12px; color:#888; display:flex; gap:16px; }
.header .stats span { background:#f5f5f5; padding:3px 10px; border-radius:10px; }
.search-box { flex:1; max-width:280px; position:relative; }
.search-box input { width:100%; padding:7px 12px 7px 32px; border:1px solid #ddd; border-radius:6px; font-size:13px; outline:none; }
.search-box input:focus { border-color:#4a6cf7; box-shadow:0 0 0 2px rgba(74,108,247,0.1); }
.search-box .sicon { position:absolute; left:10px; top:7px; color:#999; font-size:14px; }
.filter-group { display:flex; gap:6px; }
.filter-btn { padding:5px 12px; border:1px solid #ddd; border-radius:6px; font-size:12px; cursor:pointer; background:#fff; color:#555; transition:all .15s; }
.filter-btn:hover { border-color:#aaa; }
.filter-btn.active { color:#fff; font-weight:500; }
.filter-btn.ods.active { background:#52c41a; border-color:#52c41a; }
.filter-btn.dwd.active { background:#1890ff; border-color:#1890ff; }
.filter-btn.dws.active { background:#fa8c16; border-color:#fa8c16; }
.filter-btn.ads.active { background:#f5222d; border-color:#f5222d; }
.view-toggle { display:flex; border-radius:6px; overflow:hidden; border:1px solid #ddd; }
.view-toggle button { padding:6px 14px; font-size:12px; cursor:pointer; background:#fff; color:#555; border:none; border-right:1px solid #ddd; transition:all .15s; }
.view-toggle button:last-child { border-right:none; }
.view-toggle button.active { background:#4a6cf7; color:#fff; }
.btn { padding:6px 14px; border:1px solid #ddd; border-radius:6px; font-size:12px; cursor:pointer; background:#fff; color:#555; transition:all .15s; }
.btn:hover { background:#f5f5f5; }
.btn.primary { background:#4a6cf7; color:#fff; border-color:#4a6cf7; }
.btn.primary:hover { background:#3b5de7; }

.main { display:flex; flex:1; overflow:hidden; position:relative; }
.canvas-wrap { flex:1; overflow:auto; position:relative; background:#fafbfc; }
.canvas-wrap svg { display:block; }

.side-panel { width:340px; background:#fff; border-left:1px solid #e0e0e0; display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
.side-panel .panel-header { padding:12px 16px; border-bottom:1px solid #eee; font-size:14px; font-weight:600; color:#333; display:flex; align-items:center; justify-content:space-between; }
.side-panel .panel-body { flex:1; overflow-y:auto; padding:12px 16px; }
.side-panel .close-btn { cursor:pointer; font-size:18px; color:#999; line-height:1; }
.side-panel .close-btn:hover { color:#333; }

.detail-empty { text-align:center; color:#bbb; padding:40px 0; font-size:13px; }
.detail-table { width:100%; font-size:12px; border-collapse:collapse; margin-top:8px; }
.detail-table td { padding:6px 8px; border-bottom:1px solid #f0f0f0; vertical-align:top; }
.detail-table td.label { color:#888; white-space:nowrap; width:70px; }
.detail-table td.value { color:#333; word-break:break-all; }
.detail-card { background:#f9f9fb; border:1px solid #eee; border-radius:8px; padding:12px; margin-bottom:10px; }
.detail-card h4 { font-size:13px; color:#333; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.expr-box { font-family:"SF Mono","Menlo","Monaco",monospace; font-size:12px; background:#1e1e2e; color:#a6e3a1; padding:10px; border-radius:6px; overflow-x:auto; white-space:pre-wrap; word-break:break-all; margin-top:4px; }
.path-badge { display:inline-block; padding:1px 6px; border-radius:3px; font-size:11px; color:#fff; }
.path-badge.ods { background:#52c41a; }
.path-badge.dwd { background:#1890ff; }
.path-badge.dws { background:#fa8c16; }
.path-badge.ads { background:#f5222d; }

.tooltip { position:absolute; pointer-events:none; background:rgba(0,0,0,0.88); color:#fff; padding:8px 12px; border-radius:6px; font-size:12px; max-width:340px; z-index:200; display:none; line-height:1.5; }
.tooltip .tt-title { font-weight:600; margin-bottom:2px; }
.tooltip .tt-sub { color:#aaa; font-size:11px; }
.tooltip .tt-expr { font-family:monospace; color:#a6e3a1; margin-top:4px; white-space:pre-wrap; font-size:11px; }
</style>
</head>

<div class="header">
  <h1>数据血缘分析</h1>
  <div class="stats">
    <span id="stat-tables">表: --</span>
    <span id="stat-jobs">作业: --</span>
    <span id="stat-edges">字段血缘: --</span>
  </div>
  <div class="view-toggle" id="view-toggle">
    <button class="active" data-view="job">作业级视图</button>
    <button data-view="column">字段级视图</button>
  </div>
  <div class="search-box">
    <span class="sicon">&#128269;</span>
    <input type="text" id="search" placeholder="搜索表名、字段或作业...">
  </div>
  <div class="filter-group" id="filter-group">
    <button class="filter-btn ods active" data-layer="ODS">ODS</button>
    <button class="filter-btn dwd active" data-layer="DWD">DWD</button>
    <button class="filter-btn dws active" data-layer="DWS">DWS</button>
    <button class="filter-btn ads active" data-layer="ADS">ADS</button>
  </div>
  <button class="btn" id="btn-fit">适应画面</button>
  <button class="btn primary" id="btn-export">导出图片</button>
</div>

<div class="main">
  <div class="canvas-wrap" id="canvas-wrap">
    <svg id="main-svg"></svg>
  </div>
  <div class="side-panel" id="side-panel">
    <div class="panel-header">

      <span class="close-btn" id="panel-close">&times;</span>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="detail-empty">点击图中节点或连线查看详情</div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

function init() {
  const wrap = document.getElementById("canvas-wrap");
  svg = d3.select("#main-svg").attr("width", wrap.clientWidth).attr("height", wrap.clientHeight);

  const defs = svg.append("defs");
  defs.append("marker").attr("id","ah").attr("viewBox","0 0 10 7").attr("refX",10).attr("refY",3.5).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto")
    .append("path").attr("d","M0,0 L10,3.5 L0,7 Z").attr("fill","#999");
  defs.append("marker").attr("id","ah-sel").attr("viewBox","0 0 10 7").attr("refX",10).attr("refY",3.5).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto")
    .append("path").attr("d","M0,0 L10,3.5 L0,7 Z").attr("fill","#4a6cf7");

  const f = defs.append("filter").attr("id","shadow");
  f.append("feDropShadow").attr("dx",0).attr("dy",1).attr("stdDeviation",2).attr("flood-opacity",0.1);
  const g = defs.append("filter").attr("id","glow");
  g.append("feGaussianBlur").attr("stdDeviation",3).attr("result","b");
  const m = g.append("feMerge"); m.append("feMergeNode").attr("in","b"); m.append("feMergeNode").attr("in","SourceGraphic");

  // Gradients for table headers
  for (const [l,c] of Object.entries(LC)) {
    const grad = defs.append("linearGradient").attr("id",`gh-${l}`).attr("x1",0).attr("y1",0).attr("x2",1).attr("y2",0);
    grad.append("stop").attr("offset","0%").attr("stop-color",c).attr("stop-opacity",0.85);
    grad.append("stop").attr("offset","100%").attr("stop-color",c).attr("stop-opacity",0.55);
  }
  // Job node gradient
  const jg = defs.append("linearGradient").attr("id","gj").attr("x1",0).attr("y1",0).attr("x2",0).attr("y2",1);
  jg.append("stop").attr("offset","0%").attr("stop-color","#667eea");
  jg.append("stop").attr("offset","100%").attr("stop-color","#5a67d8");

  mainGroup = svg.append("g").attr("class","mg");
  zoom = d3.zoom().scaleExtent([0.1, 3]).on("zoom", ev => mainGroup.attr("transform", ev.transform));
  svg.call(zoom);

  computeLayout(); render();

  document.getElementById("search").addEventListener("input", e => { searchQuery=e.target.value.toLowerCase(); computeLayout(); render(); });
  document.querySelectorAll(".filter-btn").forEach(b => b.addEventListener("click", ()=>{
    const l=b.dataset.layer;
    if(activeLayers.has(l)){activeLayers.delete(l);b.classList.remove("active");}
    else{activeLayers.add(l);b.classList.add("active");}
    computeLayout(); render();
  }));
  document.getElementById("view-toggle").querySelectorAll("button").forEach(b => b.addEventListener("click", ()=>{
    document.querySelectorAll("#view-toggle button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    currentView=b.dataset.view;
    selectedItemId=null; expandedTables.clear();
    computeLayout(); render(); updatePanel(null);
  }));
  document.getElementById("btn-fit").onclick=fitToScreen;
  document.getElementById("btn-export").onclick=exportPNG;
  document.getElementById("panel-close").onclick=()=>updatePanel(null);
  fitToScreen();
}

// ============ HELPERS ============
function mw(t,f){const c=document.createElement("canvas"),x=c.getContext("2d");x.font=`${f}px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif`;return x.measureText(t).width;}

function tableMatchesSearch(t){
  if(!searchQuery)return true;
  if(t.name.toLowerCase().includes(searchQuery))return true;
  for(const c of t.columns){if(c.name.toLowerCase().includes(searchQuery))return true;}
  for(const j of JOBS){if(j.name.toLowerCase().includes(searchQuery)&&(j.target===t.name||j.source.includes(t.name)))return true;}
  return false;
}

function jobMatchesSearch(j){
  if(!searchQuery)return true;
  if(j.name.toLowerCase().includes(searchQuery))return true;
  if(j.logic.toLowerCase().includes(searchQuery))return true;
  for(const s of j.source){if(s.toLowerCase().includes(searchQuery))return true;}
  if(j.target.toLowerCase().includes(searchQuery))return true;
  return false;
}

// ============ LAYOUT ============
function computeLayout(){
  tablePositions={}; columnPositions={}; jobPositions={};
  if(currentView==="job") computeJobLayout();
  else computeColumnLayout();
}

function computeJobLayout(){
  // Find visible tables
  const invT=new Set(); JOBS.forEach(j=>{j.source.forEach(s=>invT.add(s));invT.add(j.target);});
  const vTab = LD.tables.filter(t=>activeLayers.has(t.layer)&&invT.has(t.name)&&tableMatchesSearch(t));
  // Group by layer
  const lg={}; vTab.forEach(t=>{const l=t.layer;if(!lg[l])lg[l]=[];lg[l].push(t);});
  Object.values(lg).forEach(g=>g.sort((a,b)=>a.name.localeCompare(b.name)));

  const H = Math.max(document.getElementById("canvas-wrap").clientHeight, 800);

  // Position tables vertically within each layer column
  for(const [layer, tables] of Object.entries(lg)){
    const x = COL_X[layer];
    const totalH = tables.length * TABLE_HEADER_H + (tables.length-1) * TABLE_GAP;
    let cy = Math.max(50, (H - totalH)/2);
    tables.forEach(t=>{
      const w = Math.max(COL_W[layer], mw(t.name,13)+80);
      tablePositions[t.name]={x, y:cy, w, h:TABLE_HEADER_H, layer, ncols:t.columns.length};
      cy += TABLE_HEADER_H + TABLE_GAP;
    });
  }

  // Position job nodes between layer pairs
  const layerPairs = [["ODS","DWD"],["DWD","DWS"],["DWS","ADS"]];
  layerPairs.forEach(([srcL,tgtL])=>{
    const jobLayer = tgtL; // jobs belong to the target layer
    const jobs = JOBS.filter(j=>j.layer===jobLayer&&jobMatchesSearch(j));
    // Compute job Y position as average of connected source/target table Y positions
    jobs.forEach(j=>{
      let srcY=0, tgtY=0, srcCnt=0, tgtCnt=0;
      j.source.forEach(s=>{if(tablePositions[s]){srcY+=tablePositions[s].y+TABLE_HEADER_H/2;srcCnt++;}});
      if(tablePositions[j.target]){tgtY=tablePositions[j.target].y+TABLE_HEADER_H/2;tgtCnt=1;}
	      let my;
	      if(srcCnt>0&&tgtCnt>0) my = (srcY/srcCnt + tgtY)/2;
	      else if(srcCnt>0) my = srcY/srcCnt;
	      else if(tgtCnt>0) my = tgtY;
	      else my = 200;

      // Prevent overlap: offset jobs that would collide
      const jobX = COL_X[`${srcL}_JOB`];
      const nameW = mw(j.name, 11);
      const jw = Math.max(JOB_NODE_MIN_W, nameW + 24);
      jobPositions[j.id] = {x:jobX, y:my-JOB_NODE_H/2, w:jw, h:JOB_NODE_H};
    });

    // Resolve overlaps between jobs in the same layer column
    const layerJobs = jobs.filter(j=>jobPositions[j.id]);
    layerJobs.sort((a,b)=>jobPositions[a.id].y-jobPositions[b.id].y);
    for(let i=1;i<layerJobs.length;i++){
      const prev=jobPositions[layerJobs[i-1].id];
      const cur=jobPositions[layerJobs[i].id];
      if(cur.y < prev.y+prev.h+8){
        cur.y = prev.y+prev.h+8;
      }
    }
  });
}

function computeColumnLayout(){
  const vTab = LD.tables.filter(t=>activeLayers.has(t.layer)&&tableMatchesSearch(t));
  const lg={}; vTab.forEach(t=>{const l=t.layer;if(!lg[l])lg[l]=[];lg[l].push(t);});
  Object.values(lg).forEach(g=>g.sort((a,b)=>a.name.localeCompare(b.name)));

  const H = Math.max(document.getElementById("canvas-wrap").clientHeight, 1200);

  for(const [layer,tables] of Object.entries(lg)){
    const x = COL_X[layer];
    let totalH=0;
    tables.forEach(t=>{
      if(expandedTables.has(t.name)){
        const cols=t.columns.filter(c=>!searchQuery||`${t.name}.${c.name}`.toLowerCase().includes(searchQuery));
        totalH+=TABLE_HEADER_H+cols.length*22+8;
      }else{totalH+=TABLE_HEADER_H;}
    });
    totalH+=(tables.length-1)*TABLE_GAP;
    let cy=Math.max(40,(H-totalH)/2);
    tables.forEach(t=>{
      const isExp=expandedTables.has(t.name);
      const cols=t.columns.filter(c=>!searchQuery||`${t.name}.${c.name}`.toLowerCase().includes(searchQuery));
      const h=isExp?TABLE_HEADER_H+cols.length*22+8:TABLE_HEADER_H;
      let w=Math.max(COL_W[layer],mw(t.name,13)+100);
      if(isExp){
        let mx=0; cols.forEach(c=>{mx=Math.max(mx,mw(c.name,12)+(c.type?mw(c.type,9)+12:0));});
        w=Math.max(w,mx+48);
      }
      tablePositions[t.name]={x,y:cy,w,h,layer,isExpanded:isExp,ncols:cols.length};
      if(isExp){
        const sy=cy+TABLE_HEADER_H+4;
        cols.forEach((c,i)=>{columnPositions[`${t.name}.${c.name}`]={x1:x,x2:x+w,y:sy+i*22+11,idx:i,table:t.name,column:c.name};});
      }
      cy+=h+TABLE_GAP;
    });
  }
}

// ============ RENDER ============
function render(){
  let mxR=0,mxB=0; Object.values(tablePositions).forEach(p=>{mxR=Math.max(mxR,p.x+p.w);mxB=Math.max(mxB,p.y+p.h);});
  Object.values(jobPositions).forEach(p=>{mxR=Math.max(mxR,p.x+p.w);mxB=Math.max(mxB,p.y+p.h);});
  const W=Math.max(mxR+80,document.getElementById("canvas-wrap").clientWidth);
  const H=Math.max(mxB+200,document.getElementById("canvas-wrap").clientHeight);
  svg.attr("width",W).attr("height",H);
  mainGroup.selectAll("*").remove();

  // Grid
  const grid=mainGroup.append("g").attr("class","grid");
  for(let gx=0;gx<W;gx+=60) grid.append("line").attr("x1",gx).attr("y1",0).attr("x2",gx).attr("y2",H).attr("stroke","#eee").attr("stroke-width",0.5);
  for(let gy=0;gy<H;gy+=60) grid.append("line").attr("x1",0).attr("y1",gy).attr("x2",W).attr("y2",gy).attr("stroke","#eee").attr("stroke-width",0.5);

  // Layer headers
  const layers = activeLayers.size>0 ? [...activeLayers] : ["ODS","DWD","DWS","ADS"];
  layers.forEach(l=>{
    const x=COL_X[l];
    mainGroup.append("text").attr("x",x+8).attr("y",24).attr("fill",LC[l]).attr("font-size",14).attr("font-weight",700).text(LL[l]);
  });
  if(currentView==="job"){
    ["DWD_JOB","DWS_JOB","ADS_JOB"].forEach(jl=>{
      const x=COL_X[jl];
      mainGroup.append("text").attr("x",x).attr("y",24).attr("fill","#8c8c8c").attr("font-size",11).attr("font-weight",500).text("作业");
    });
  }

  if(currentView==="job") renderJobView();
  else renderColumnView();

  // Legend
  const leg=mainGroup.append("g").attr("transform","translate(20,50)");
  leg.append("rect").attr("width",160).attr("height",currentView==="job"?118:96).attr("rx",6).attr("fill","#fff").attr("stroke","#eee");
  leg.append("text").attr("x",12).attr("y",20).attr("font-size",11).attr("font-weight",600).text("图例");
  [["#52c41a","ODS 贴源层"],["#1890ff","DWD 明细层"],["#fa8c16","DWS 汇总层"],["#f5222d","ADS 应用层"]].forEach(([c,lb],i)=>{
    leg.append("circle").attr("cx",18).attr("cy",34+i*20).attr("r",5).attr("fill",c);
    leg.append("text").attr("x",30).attr("y",38+i*20).attr("font-size",11).attr("fill","#555").text(lb);
  });
  if(currentView==="job"){
    leg.append("rect").attr("x",10).attr("y",108).attr("width",16).attr("height",16).attr("rx",4).attr("fill","#667eea");
    leg.append("text").attr("x",30).attr("y",121).attr("font-size",11).attr("fill","#555").text("作业节点");
  }
}

function renderJobView(){
  // Draw edges: source table → job, job → target table
  JOBS.forEach(j=>{
    const jp=jobPositions[j.id];
    if(!jp)return;
    const isSel=selectedItemId===j.id;

    // Source → Job lines
    j.source.forEach(s=>{
      const sp=tablePositions[s];
      if(!sp)return;
      const sx=sp.x+sp.w, sy=sp.y+sp.h/2;
      const jx=jp.x, jy=jp.y+jp.h/2;
      const dx=jx-sx;
      mainGroup.append("path")
        .attr("d",`M${sx},${sy} C${sx+dx*0.5},${sy} ${jx-dx*0.5},${jy} ${jx},${jy}`)
        .attr("fill","none").attr("stroke",isSel?"#4a6cf7":"#bbb")
        .attr("stroke-width",isSel?2:1.2).attr("opacity",isSel?1:0.6);
      // Clickable wide path
      mainGroup.append("path")
        .attr("d",`M${sx},${sy} C${sx+dx*0.5},${sy} ${jx-dx*0.5},${jy} ${jx},${jy}`)
        .attr("fill","none").attr("stroke","transparent").attr("stroke-width",10)
        .style("cursor","pointer")
        .on("click",()=>{selectedItemId=j.id;render();updatePanel(j);})
        .on("mouseenter",ev=>showTT(ev,jobTT(j))).on("mouseleave",hideTT);
    });

    // Job → Target lines
    const tp=tablePositions[j.target];
    if(tp){
      const jx=jp.x+jp.w, jy=jp.y+jp.h/2;
      const tx=tp.x, ty=tp.y+tp.h/2;
      const dx=tx-jx;
      mainGroup.append("path")
        .attr("d",`M${jx},${jy} C${jx+dx*0.5},${jy} ${tx-dx*0.5},${ty} ${tx},${ty}`)
        .attr("fill","none").attr("stroke",isSel?"#4a6cf7":"#bbb")
        .attr("stroke-width",isSel?2:1.2).attr("opacity",isSel?1:0.6)
        .attr("marker-end",isSel?"url(#ah-sel)":"url(#ah)");
      mainGroup.append("path")
        .attr("d",`M${jx},${jy} C${jx+dx*0.5},${jy} ${tx-dx*0.5},${ty} ${tx},${ty}`)
        .attr("fill","none").attr("stroke","transparent").attr("stroke-width",10)
        .style("cursor","pointer")
        .on("click",()=>{selectedItemId=j.id;render();updatePanel(j);})
        .on("mouseenter",ev=>showTT(ev,jobTT(j))).on("mouseleave",hideTT);
    }
  });

  // Draw job nodes
  Object.entries(jobPositions).forEach(([jid,jp])=>{
    const job=JOBS.find(j=>j.id===jid);
    if(!job)return;
    const isSel=selectedItemId===jid;

    const jg=mainGroup.append("g").style("cursor","pointer")
      .on("click",()=>{selectedItemId=jid;render();updatePanel(job);})
      .on("mouseenter",ev=>showTT(ev,jobTT(job))).on("mouseleave",hideTT);

    // Pill shape
    jg.append("rect").attr("x",jp.x).attr("y",jp.y).attr("width",jp.w).attr("height",jp.h)
      .attr("rx",jp.h/2).attr("fill",isSel?"#4a6cf7":"url(#gj)")
      .attr("filter",isSel?"url(#glow)":"url(#shadow)")
      .attr("stroke",isSel?"#3b5de7":"#4c51bf").attr("stroke-width",0.5);

    // Icon
    jg.append("text").attr("x",jp.x+10).attr("y",jp.y+17)
      .attr("font-size",11).text("⚙");

    // Name
    jg.append("text").attr("x",jp.x+26).attr("y",jp.y+17)
      .attr("fill","#fff").attr("font-size",11).attr("font-weight",500)
      .text(job.name);
  });

  // Draw table nodes
  Object.entries(tablePositions).forEach(([tn,p])=>{
    const t=LD.tables.find(tbl=>tbl.name===tn);
    if(!t)return;
    const isSel=selectedItemId===tn;
    const c=LC[p.layer];

    const tg=mainGroup.append("g").style("cursor","pointer")
      .on("click",()=>{selectedItemId=tn;render();updatePanel(tn);})
      .on("dblclick",()=>{
        currentView="column";
        document.querySelectorAll("#view-toggle button").forEach(b=>b.classList.remove("active"));
        document.querySelector("#view-toggle [data-view=column]").classList.add("active");
        expandedTables=new Set([tn]); computeLayout(); render(); updatePanel(t);
      })
      .on("mouseenter",ev=>showTT(ev,tableTT(t))).on("mouseleave",hideTT);

    // Card
    tg.append("rect").attr("x",p.x).attr("y",p.y).attr("width",p.w).attr("height",p.h)
      .attr("rx",6).attr("fill","#fff")
      .attr("stroke",isSel?c:"#ddd").attr("stroke-width",isSel?2.5:1)
      .attr("filter",isSel?"url(#glow)":"url(#shadow)");

    // Left accent
    tg.append("rect").attr("x",p.x).attr("y",p.y+3).attr("width",4).attr("height",p.h-6).attr("rx",2).attr("fill",c);

    // Table icon + name
    tg.append("text").attr("x",p.x+14).attr("y",p.y+22).attr("font-size",11).text("📋");
    tg.append("text").attr("x",p.x+30).attr("y",p.y+22).attr("fill","#333").attr("font-size",12).attr("font-weight",600).text(tn);

    // Column count + layer badge
    const bw=mw(`${p.ncols}列`,9)+14;
    tg.append("rect").attr("x",p.x+p.w-bw-8).attr("y",p.y+9).attr("width",bw).attr("height",16).attr("rx",8).attr("fill",LB[p.layer]);
    tg.append("text").attr("x",p.x+p.w-8-bw/2).attr("y",p.y+20).attr("text-anchor","middle").attr("fill",c).attr("font-size",9).text(`${p.ncols}列`);

    // Hint
    tg.append("text").attr("x",p.x+p.w/2).attr("y",p.y+p.h+14).attr("text-anchor","middle").attr("fill","#aaa").attr("font-size",10).text("双击展开字段");
  });
}

function renderColumnView(){
  // Edges
  LD.edges.forEach(e=>{
    const s=columnPositions[e.source], t=columnPositions[e.target];
    if(!s||!t)return;
    const sTab=e.source.split(".")[0], tTab=e.target.split(".")[0];
    if(!activeLayers.has(LD.tables.find(x=>x.name===sTab)?.layer))return;
    if(!activeLayers.has(LD.tables.find(x=>x.name===tTab)?.layer))return;
    if(!expandedTables.has(sTab)||!expandedTables.has(tTab))return;
    if(searchQuery&&!e.source.toLowerCase().includes(searchQuery)&&!e.target.toLowerCase().includes(searchQuery))return;
    const isSel=selectedItemId&&(e.source===selectedItemId||e.target===selectedItemId);
    const sx=s.x2,sy=s.y,tx=t.x1,ty=t.y,dx=tx-sx;
    mainGroup.append("path")
      .attr("d",`M${sx},${sy} C${sx+dx*0.4},${sy} ${tx-dx*0.4},${ty} ${tx},${ty}`)
      .attr("fill","none").attr("stroke",isSel?"#4a6cf7":"#ddd")
      .attr("stroke-width",isSel?1.8:1).attr("opacity",isSel?1:0.5)
      .attr("marker-end","url(#ah)");
    mainGroup.append("path")
      .attr("d",`M${sx},${sy} C${sx+dx*0.4},${sy} ${tx-dx*0.4},${ty} ${tx},${ty}`)
      .attr("fill","none").attr("stroke","transparent").attr("stroke-width",8)
      .style("cursor","pointer")
      .on("click",()=>{selectedItemId=e.source+"→"+e.target;render();updatePanel(e);})
      .on("mouseenter",ev=>showTT(ev,edgeTT(e))).on("mouseleave",hideTT);
  });

  // Tables
  Object.entries(tablePositions).forEach(([tn,p])=>{
    const t=LD.tables.find(tbl=>tbl.name===tn);
    if(!t)return;
    const c=LC[p.layer];
    const isSel=selectedItemId===tn;

    const tg=mainGroup.append("g").style("cursor","pointer")
      .on("click",()=>{
        if(p.isExpanded){selectedItemId=tn;}
        else{if(expandedTables.has(tn))expandedTables.delete(tn);else expandedTables.add(tn);computeLayout();}
        render();updatePanel(tn);
      })
      .on("mouseenter",ev=>showTT(ev,tableTT(t))).on("mouseleave",hideTT);

    tg.append("rect").attr("x",p.x).attr("y",p.y).attr("width",p.w).attr("height",p.h)
      .attr("rx",6).attr("fill","#fff")
      .attr("stroke",isSel?c:"#ddd").attr("stroke-width",isSel?2.5:1)
      .attr("filter",isSel?"url(#glow)":"url(#shadow)");

    // Header
    tg.append("rect").attr("x",p.x).attr("y",p.y).attr("width",p.w).attr("height",TABLE_HEADER_H)
      .attr("rx",6).attr("fill",`url(#gh-${p.layer})`);
    tg.append("rect").attr("x",p.x+6).attr("y",p.y+TABLE_HEADER_H-6).attr("width",p.w-12).attr("height",6).attr("fill","#fff");
    tg.append("text").attr("x",p.x+10).attr("y",p.y+23).attr("fill","#fff").attr("font-size",12).attr("font-weight",600)
      .text(p.isExpanded?`${tn} (${p.ncols})`:tn);

    if(!p.isExpanded){
      const nx=mw(tn,12)+24;
      tg.append("text").attr("x",p.x+nx).attr("y",p.y+23).attr("fill","rgba(255,255,255,0.8)").attr("font-size",11).text(`${p.ncols}列 ▸`);
    }

    if(p.isExpanded){
      const cols=t.columns.filter(c=>!searchQuery||`${t.name}.${c.name}`.toLowerCase().includes(searchQuery));
      cols.forEach((col,i)=>{
        const ry=p.y+TABLE_HEADER_H+4+i*22;
        const cid=`${tn}.${col.name}`;
        const isColSel=selectedItemId===cid;
        if(isColSel){
          tg.append("rect").attr("x",p.x+4).attr("y",ry-1).attr("width",p.w-8).attr("height",22).attr("rx",3).attr("fill",LB[p.layer]).attr("stroke",c).attr("stroke-width",1);
        }
        // Dot
        const isSrc=LD.edges.some(e=>e.source===cid&&columnPositions[e.target]);
        const isTgt=LD.edges.some(e=>e.target===cid&&columnPositions[e.source]);
        let dc="#ddd";if(isSrc)dc="#fa8c16";if(isTgt)dc="#1890ff";if(isSrc&&isTgt)dc="#722ed1";
        tg.append("circle").attr("cx",p.x+15).attr("cy",ry+10).attr("r",4).attr("fill",dc);
        // Name
        tg.append("text").attr("x",p.x+25).attr("y",ry+14).attr("fill","#333").attr("font-size",11)
          .text(col.name).style("cursor","pointer")
          .on("click",ev=>{ev.stopPropagation();selectedItemId=cid;render();updatePanel(cid);});
        // Type
        if(col.type){
          const tw=mw(col.type,9)+8;
          tg.append("rect").attr("x",p.x+p.w-tw-16).attr("y",ry+2).attr("width",tw).attr("height",16).attr("rx",3).attr("fill","#f5f5f5");
          tg.append("text").attr("x",p.x+p.w-12-tw/2).attr("y",ry+13).attr("text-anchor","middle").attr("fill","#999").attr("font-size",9).text(col.type);
        }
      });
    }
  });
}

// ============ TOOLTIPS ============
function showTT(ev,html){const tt=document.getElementById("tooltip");tt.innerHTML=html;tt.style.display="block";tt.style.left=(ev.clientX+16)+"px";tt.style.top=(ev.clientY-10)+"px";}
function hideTT(){document.getElementById("tooltip").style.display="none";}
function jobTT(j){return `<div class="tt-title">⚙ ${j.name}</div><div class="tt-sub">${j.file}</div>源表: ${j.source.join(", ")}<br>目标表: ${j.target}<br><div class="tt-expr">${j.logic}</div>`;}
function tableTT(t){return `<div class="tt-title">${t.name}</div><div class="tt-sub">${t.full_name} | ${t.layer}</div>列数: ${t.columns.length}<br><span style="color:#888;">点击查看详情 · 双击展开字段</span>`;}
function edgeTT(e){return `<b>${e.source}</b> → <b>${e.target}</b><br><div class="tt-sub">${e.source_file}</div><div class="tt-expr">${e.expression}</div>`;}

// ============ PANEL ============
function updatePanel(item){
  const title=document.getElementById("panel-title"),body=document.getElementById("panel-body");
  if(!item){title.textContent="详情";body.innerHTML='<div class="detail-empty">点击图中节点或连线查看详情</div>';return;}

  // Job
  if(item.id&&item.file){
    title.textContent="作业详情";
    const srcTabs=item.source.map(s=>{const t=LD.tables.find(tbl=>tbl.name===s);return t?`<span class="path-badge ${t.layer.toLowerCase()}">${t.layer}</span> ${s}`:s;}).join("<br>&nbsp;&nbsp;");
    const tgtT=LD.tables.find(tbl=>tbl.name===item.target);
    const tgtBadge=tgtT?`<span class="path-badge ${tgtT.layer.toLowerCase()}">${tgtT.layer}</span>`:"";
    body.innerHTML=`
      <div class="detail-card"><h4>${item.name}</h4>
        <table class="detail-table">
          <tr><td class="label">脚本</td><td class="value">${item.file}</td></tr>
          <tr><td class="label">加工逻辑</td><td class="value">${item.logic}</td></tr>
        </table></div>
      <div class="detail-card"><h4>血缘流向</h4>
        <table class="detail-table">
          <tr><td class="label">源表</td><td class="value">${srcTabs}</td></tr>
          <tr><td class="label">目标表</td><td class="value">${tgtBadge} ${item.target}</td></tr>
        </table></div>
      <div class="detail-card"><h4>涉及字段血缘</h4>
        <div style="font-size:12px;color:#888;max-height:200px;overflow-y:auto;">
          ${LD.edges.filter(e=>e.source_file===item.file).map(e=>`<div style="padding:2px 0;">${e.source} → <b>${e.target}</b></div>`).join("")||'<span style="color:#ccc;">无</span>'}
        </div></div>`;
    return;
  }

  // String: table or column
  if(typeof item==="string"){
    const t=LD.tables.find(tbl=>tbl.name===item);
    if(!t){
      const parts=item.split(".");
      const tbl=LD.tables.find(x=>x.name===parts[0]);
      if(tbl&&parts.length===2){const col=tbl.columns.find(c=>c.name===parts[1]);if(col){showColDetail(tbl,col);return;}}
      return;
    }
    // Table detail
    const rj=JOBS.filter(j=>j.target===t.name||j.source.includes(t.name));
    title.textContent="表详情";
    body.innerHTML=`
      <div class="detail-card"><h4><span class="path-badge ${t.layer.toLowerCase()}">${t.layer}</span> ${t.name}</h4>
        <table class="detail-table"><tr><td class="label">全名</td><td class="value">${t.full_name}</td></tr><tr><td class="label">列数</td><td class="value">${t.columns.length}</td></tr></table></div>
      <div class="detail-card"><h4>相关作业 (${rj.length})</h4>
        ${rj.map(j=>{const isTgt=j.target===t.name;return`<div style="font-size:12px;padding:3px 0;cursor:pointer;color:#4a6cf7;" onclick="selJob('${j.id}')">${isTgt?'📥':'📤'} ${j.name} <span style="color:#aaa;font-size:11px;">${isTgt?'(目标)':'(源)'}</span></div>`;}).join("")||'<span style="color:#ccc;font-size:12px;">无</span>'}</div>
      <div class="detail-card"><h4>字段列表</h4>
        <div style="font-size:12px;max-height:300px;overflow-y:auto;">${t.columns.map(c=>`<div style="padding:3px 0;cursor:pointer;color:#4a6cf7;" onclick="selCol('${t.name}.${c.name}')">${c.name} <span style="color:#aaa;">${c.type||""}</span></div>`).join("")}</div></div>`;
    return;
  }

  // Edge
  if(item.source&&item.target&&!item.file){
    title.textContent="字段血缘";
    body.innerHTML=`<div class="detail-card"><h4>字段映射</h4><table class="detail-table"><tr><td class="label">源字段</td><td class="value">${item.source}</td></tr><tr><td class="label">目标</td><td class="value">${item.target}</td></tr><tr><td class="label">表达式</td><td class="value"><div class="expr-box">${item.expression}</div></td></tr><tr><td class="label">脚本</td><td class="value">${item.source_file}</td></tr></table></div>`;
  }
}

function showColDetail(tbl,col){
  const cid=`${tbl.name}.${col.name}`;
  const up=LD.edges.filter(e=>e.target===cid);
  const dn=LD.edges.filter(e=>e.source===cid);
  document.getElementById("panel-title").textContent="字段详情";
  document.getElementById("panel-body").innerHTML=`
    <div class="detail-card"><h4>${cid}</h4><table class="detail-table"><tr><td class="label">表</td><td class="value"><span class="path-badge ${tbl.layer.toLowerCase()}">${tbl.layer}</span> ${tbl.name}</td></tr><tr><td class="label">类型</td><td class="value">${col.type||"—"}</td></tr><tr><td class="label">注释</td><td class="value">${col.comment||"—"}</td></tr></table></div>
    ${up.length?`<div class="detail-card"><h4>上游来源 (${up.length})</h4>${up.map(e=>`<div style="font-size:12px;padding:2px 0;">← ${e.source}<div class="expr-box" style="font-size:11px;">${e.expression}</div></div>`).join("")}</div>`:""}
    ${dn.length?`<div class="detail-card"><h4>下游引用 (${dn.length})</h4>${dn.map(e=>`<div style="font-size:12px;padding:2px 0;">→ ${e.target}<div class="expr-box" style="font-size:11px;">${e.expression}</div></div>`).join("")}</div>`:""}`;
}

function selJob(id){const j=JOBS.find(x=>x.id===id);if(j){selectedItemId=id;render();updatePanel(j);}}
function selCol(cid){
  if(currentView!=="column"){currentView="column";document.querySelectorAll("#view-toggle button").forEach(b=>b.classList.remove("active"));document.querySelector("#view-toggle [data-view=column]").classList.add("active");}
  expandedTables=new Set([cid.split(".")[0]]);selectedItemId=cid;computeLayout();render();showColDetail(LD.tables.find(t=>t.name===cid.split(".")[0]),LD.tables.find(t=>t.name===cid.split(".")[0])?.columns.find(c=>c.name===cid.split(".")[1]));
}

// ============ ZOOM & EXPORT ============
function fitToScreen(){
  const wrap=document.getElementById("canvas-wrap"),W=wrap.clientWidth,H=wrap.clientHeight;
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  Object.values(tablePositions).forEach(p=>{mnX=Math.min(mnX,p.x);mnY=Math.min(mnY,p.y);mxX=Math.max(mxX,p.x+p.w);mxY=Math.max(mxY,p.y+p.h);});
  Object.values(jobPositions).forEach(p=>{mnX=Math.min(mnX,p.x);mnY=Math.min(mnY,p.y);mxX=Math.max(mxX,p.x+p.w);mxY=Math.max(mxY,p.y+p.h);});
  if(mnX===Infinity)return;
  const cw=mxX-mnX,ch=mxY-mnY;
  const sc=Math.min((W-40)/cw,(H-80)/ch,1.1);
  const tx=(W-cw*sc)/2-mnX*sc,ty=(H-ch*sc)/2-mnY*sc;
  svg.transition().duration(400).call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(sc));
}

async function exportPNG(){
  const s=document.getElementById("main-svg"),cl=s.cloneNode(true);
  cl.setAttribute("xmlns","http://www.w3.org/2000/svg");
  const d=new XMLSerializer().serializeToString(cl);
  const b=new Blob([`<?xml version="1.0" encoding="UTF-8"?>${d}`],{type:"image/svg+xml"});
  const u=URL.createObjectURL(b),img=new Image();
  img.onload=()=>{const c=document.createElement("canvas");c.width=img.width*2;c.height=img.height*2;const x=c.getContext("2d");x.scale(2,2);x.fillStyle="#fafbfc";x.fillRect(0,0,img.width,img.height);x.drawImage(img,0,0);const a=document.createElement("a");a.download="data_lineage.png";a.href=c.toDataURL("image/png");a.click();URL.revokeObjectURL(u);};
  img.src=u;
}
</script>
